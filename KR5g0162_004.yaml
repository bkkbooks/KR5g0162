body:
  text: 駕乘品第七九龍駕玉京建齊行道四天帝王皆駕飛龍録軿八景玉輿從真人玉女手把華憣前導鳳歌後從天鈞白鶴師子嘯歌雍雍燒香散花觀聽玉音靈寶大誡元始回玉駕黃旌召風雲掃除五道場諸天大聖妙行真人皆乘碧霞九靈流景飛雲玉輿赤書太上大道君初乘一景之輿駕八素紫雲攝希微倉帝俱東行詣玉臺天現玉清紫道虛皇上君受九暉太晨隱符次乘二景之輿駕七素絳雲攝中微赤帝俱南行詣南桃龍羅天現玉清翼日虛皇上道君受觀靈元晨隱符次乘三景之輿駕六素紅雲攝紫微白帝西北行詣碧落空歌天現玉清昌陽始虛皇髙元君受總晨九極隱符次乘四景之與駕五素青雲攝玄微黑帝俱北行現玉清七靜導生髙上虛皇君受沓曜旋根隱符次乘五景之輿駕四素黃雲攝始微上帝東北行詣扶刀蓋華浮羅天現玉清大明虛皇洞清君受玄景晨牙隱符次乘六景之輿駕三乘緑雲攝靈微中帝東南行詣𥘉默天現玉清始元虛皇太霄君受合暉晨命隱符次乘七景之輿駕二素紫雲攝宣下帝西南行詣冲容育鬱天現玉清七觀無生虛皇金靈君受髙暉晨玄隱符次乘八景之輿駕一素靈雲攝洞微真帝西北行現玉清八觀髙無虛皇渟景君受髙上龍煙符次乘洞景玉輿駕太霞紫煙玄景之暉攝九微內帝及上皇九玄天諸真仙王俱仰登彌梵羅臺霄絶寥丘飛元嘗根之都玉清上天玉清紫暉太上玉皇明上大道君受髙清太無極上道君隱符大洞真經得道大神白玉王毋乘九蓋華輿雲龍翼從仙童羅前玉女列後散花交其左燔香觀其右上清隱書龍文方諸東海青童大君清齊於靈榭丹闕黃房三年乘碧霞三靈流景雲輿靈書太上大道君上皇元年九月一日西遊玉國龍崛山元始天尊乘碧霞緑輿而來諸天踊躍金籙簡文諸天大神聖天尊帝王髙仙真人各持齊奉法宗太上虛皇齊日並乘飛龍八景雲輿大會太上玄都玉京九靈太真誦曰龍裙拂霄上虎旗攝朱兵出玉京山經斑龍之輿光明八道之輿玄景緑輿金真玉光丹霞絳輿太微帝君命太微上真勑羣靈整甲齊鋒乃登八瓊玉輦如玄景之暉太霞部靈引曰使七日晨合明五皇驅除太甲陽精八素啓輿玄剛斬兵羽蓋停空萬騎相傾毒龍翼軒飛煙繞軿金玄披誦太霄章三關自當明雲降徘徊輦虛遣飛霞軿大霄琅書夜光玉女服雲林之翠羅乘靈蛇以啓真駕鹿輦於天河五符忽遇扶桑王九者仙都真驂駕紫虬輦雲顔一何鮮衆真歌八光輦徘徊玉輦青童君乘玉雕之軿御圓珠之氣登雲波之山入東華之室大洞玉經萬華先生乘三素之景羽明之軿北登髙元之嶽寢萬華之堂司禁真伯上帝王君時乘日月之軿上登重謨之山仙者足懸五嶽手把明霞三元靈紫素雲駢空徘徊霄庭流雲丹輿三素飛軿入我八門乃知死生法輪緑軿入我玄玄門玄一真人誦太丹隱書徘徊八煙乘飊策景龍騰九天羽明者上清天人之車大洞玉經太極元君乘淩羽之車宴上清之官金臺王毋給西靈王妃太華玉女三百人鳯車二十四乘使詣金闕受書以登玉清上官誦讀大洞真經三十九章萬過中央黃老君上奏太上命丹飊緑蓋之車九靈使者太一司命迎子六甲神八節日乘白鸞之車駕黑翮之鳯以宴常陽倒景看遊八方神嶽太上太極緑景真道君乘珠玉之輦騰蛇為輪老子歷藏中東海青童乘獨飊飛輪車案行香洞山茅君內傳飛龜玄雲之車青雲之車五色雲車赤雲氣車紫雲之車白雲之車含光玉真元始上尊傳自然靈圖二十四生部洞天八景神仙度命天仙兵馬地仙兵馬真人兵馬神人兵馬日月星辰九宫五帝五嶽三河四海等兵馬各九億萬騎金龍騎飛龍騎龍雲龍虎龍騰竿騎各九億萬衆以授太上道君二十四生三萬六千赤童騎手捉鐡杖遊行天下取五逆人洞淵妙行真人無鞅數衆乘飛雲丹霄緑輿瓊輪上聖大道君與髙上玉帝十方至真並乘五色瓊輪靈妃散花金童揚煙詣元始金闕之下請受真文赤書南極紫元夫人詩命駕玉錦輪舞轡仰徘徊浮景清霞妙八龍正參差衆真歌飛龜紫輪元録老子御明光華蓋四極衆真仙人無鞅數衆造鶴鳴山石室中設自然座有金華寶蓋羅覆大衆真人大衆一時乘空御飛龍寶蓋仙公內傳元始從諸天大聖十方至真無極神王天仙飛仙地仙五帝真人並乘八景玉輿三素飛雲瓊輪羽蓋五色華光靈章佩月蓋授玉芝掇隱華太上道君西遊玉門龍崛山元始天尊乘三素飛雲神仙羽蓋而來金録簡文玄雲紫蓋紫書金把服餌品第八雲人羽客餐霞餌氣靈關統三元精變結五神九錬瓊胎府凝氣以成仙服餌慎九靈靜念降玉軒八坦四門髙上服神丹五石錬生神寶五宫為九宫真人鬱鬱五雲芝玄暉吐玉光凝津洞靈府徘徊日月宫五色理髙真流煥洞十方呼吸不覺疲飛天並金容導引餐靈氣玄哺六胃充二十四生圖行九晨照洞房泥丸之法檢魂魄制萬邪仙靈之氣降于寢房所謂引三光九星以照百神太一帝君天鬼同變冲虛太和氣吐納流霞津胎息靜百關寥寥究三便玉京山經胎中之子噓隂吸陽以內氣養其性太平氣者神明之器清濁之宗食玄根之氣神明八聰身有日映面有玉津眼生明光齒含紫氣道要於金醴事妙於水玉所謂吐納自然之太和御九精之靈氣食氣萬嵗𢘆有少容五符元始五氣以雞鳴上㑹靈寶玉山玄都上宫陽光𥘉明散元始之暉流灌諸天其氣𣡡𣡡其暉薰薰精如月珠光如紫山下注學士五牙之根上宫衆聖大智真人餐食其暉與天相畢靈寶玉訣餐牙法八節日入室清齊存五老形象行之八年仙宮玉女侍衛身生光明照映十方五帝稽首三界司迎五仙玉芝玄中澳二十四生圖常思脾中有大日日中有黃金樓樓中有書封以黃金之印廣縱三字日威嬉見而讀之心關日明神仙矣老子觀天念胃中黃田中正白如凝脂中有黃氣至口咽之即館謂黃田者太倉也諸神就中食中有黃竈釡甑玉女小童使令呼曰黃帝子致行廚矣導氣九上九下十二日體輕十八日小成三十六日道大成八十日頭面有光百二十日是真人燒香入室首南正頭閉氣叩齒二十四通存一如法見離在頭上坎在臍下坤在左手中巽在右手中乾在左足下艮在右足下兊在左脅下震在右脅下八卦有象象中有氣氣中有神神人光明備列八方口吐生氣眷震王生火夏離王生土秋兊王生水冬坎王生木四季乾坤艮巽王金依月回轉巽三月坤六月乾九月艮十二月咽八氣法春寅卯之月歙震氣三咽次吸離氣九咽次吸巽氣四咽次吸坤氣二咽次吸乾氣六咽次吸艮氣八咽次吸兊氣七咽次吸坎氣一咽畢叩齒三十六通摩四支五體行之當清齊三時六時拜太上八素朝暮讀甲子乙丑丙寅丁卯戊辰止向辰以金梁叩玉𢎹循華池讀醴泉剝舟池取露汋瀨之周璇至三而一咽三咽止下貞六甲如𥘉法凡三十咽咽其精華所謂金梁舌也玉玦齒也醴泉丹池露汋口中唾也服氣法朝餐五雲氣夕吸三晨光空洞靈章大道妙無象震化表三神朝引五星精中吸日中津夕食黃月華寢卧錬五仙二十四生圖食日之精子必長生以月一日三五七九十五日日出時至日中食之先念中心有日日有玄蓋下有小童正赤赤氣遍身中外九重思氣滿頭從頭出上升天繞日九重呪曰日君元陽還歸絳言與我合德俱養小童因思日精下入鼻中咽之三九滿心中有三人左太一父也右玄光毋也中央赤子小童也坐金床玉榻執王梓玉柸柸中玉英神酒并天芝草見存食之長生矣食月之精可以長生月十五日夜半時向月再拜呪曰月君子光還歸丹田與我合德俱養小童思月白素黃精下入鼻口咽之三七月精託腎根長生也食星之精上升太清以日出哺時日中夜半上念北極大黃星呪曰皇天上常太上道君曽孫小兆願得長生念星精來下在兩眉間流入鼻口咽之三五氣滿心膽脾脾中有道毋主哺赤子即得長生矣飛舟名霜煎錬雲水朱玉鮮金九爐炎霄升身九天超躍玄洲可遊九官之間未得真人門戶八素仙方九品一曰太和自然龍胎之醴二玉胎瓊液之膏三飛舟紫華流精四味光雲碧之英五九泉虹華神丹六清金液之華七九轉雪霜之丹八九鼎雲英九雲光水石流飛龍胎飛丹上藥也未光泉太清中品也九轉九鼎雲光下品也太上八景紫漿神丹或名四蘂紫花或火微紫玉英或五珠華丹或絳生晨華或三華上神丹或太上飛剛或九神上丹凡八品九真中九丹者九道如九方也服之夀萬世苐一丹名九華苐二神符第三龍丹第四還丹五餌丹六瑓丹七深丹八伏丹九寒丹真人流珠九轉神仙九丹經中黃八道金書紫文九轉霜雪琅玕華丹還白玉酒金液流精玉林結華日月之水皆白日升仙登天之道出自帝君所藏于瑶臺非有真録不得其法琅玕鬱華七陽日嬰九琳之液八瓊之精四蘂紫漿五琳絳生三華飛剛𩀱珠月明蘭腴金胎甘露玉瓶青建轉羅漂芝流靈神梁丹散玄阿連縈琅根朝結黃帝素盈可以衝躍玄霄飛虛玉清呼而吸之以至真靈漱而變之以入帝庭火洞山飛虛走空洞陽宫流火庭中有炎光八錬自然玄丹黃氣陽精三道順行神丹三十六水金液之術丹簡墨録舍利是金液之凝精還丹之變化真一自然之氣九轉還丹一劑神方一首茅君賜二弟仙毋金丹一名西王毋停年止氣丹疑白蜜三升丹精明有白華者三斤雲母屑二斤著銅器中桑木薪微火煎凉之三日又蒸之三十日當以白日竟日火蒸又煮銅器三日三夜曝燥搗三萬杵細篩為散以白蜜丸如小豆平旦服二十丸長生不死色如女子大洞真經藥玉醴金漿飛騰之藥太上道君問太上老君告子靈真絳術天仙之方玉庭百芝上清精藥乃曰六亭發華營玄光八角風寶雲子帝坦王闥金敷英英廣天黃木昌城玉蘂夜山火玉鳯林鳴酢西瑶瓊酒中華紫蜜小陵緑阜絳津金髓月精日夀朱河琅子蓬山文醜濯水七莖崩嶽電栁北採玄郭之綺葱仰漱雲山之朱蜜夜牛伏骨神吾黃漆空洞靈瓜四劫一實冥域麟膽英山夜日東採扶桑之丹椹俯採長淵之文藻上和九轉之文王下咽青玄之霞寶太虛結鏡素女懷抱紫虬童子九色鳯腦太極隱芝絳樹日道太上虹李天漢大草南宫巨珠西鄉扶老三梁龍華靈妃所討有得食之後天而老此玉清之所服太上之所寶可以上飛景霄分晨億道守鎮黃精朝注九腦聞玄音以散濁聽風氣而逐穢矣其次上清幽芝太上九時有八光太和斑龍黑胎文虎白沫出于西丘七玄飛節九孔瓊珠雲漿琳一玄圃琅腴鍾山白膠金生青敷䦘風石腦河珊瑚蒙山白鳯玉肺靈丘倉鸞金血東英朱菜九節交結太微紫麻瓊華玉寶流淵鳯眼赤河絳璧北汲太極之井掇文珠之脉雲庭神桃昆園平雀夜精白草青津碧荻真宫鬱壇玄都三蓋左服玉童之光右挹玉女之氣上招神光下飲玄瀨仰掘蘭圃之瓊精俯摘玄丘之紫奈白水靈蛤八天赤韭萬載一生流光九隊有得食之後天而逝天帝之所服太上之寶貴非太極之所聞中真之所逮其次太極之品四真常𤤽乃曰九石錬煙丹液玉滋苟首流珠琳華石精丹爐金液紫華紅英太清九轉五雲之漿玄霜絳雪騰躍一黃東瀛白香滄浪青錢商丘餘糧積石飛田太虛還丹太秦玄堅長光流景雲童飛天此天仙之所服非陸遊之所聞山客之所見又當知九化十變𨼆地八術乃能廣遊玄空倒步天河乘雲駕龍陵騰無方其次三十六芝飛爐煉煙陽水月華五公之腴填生五藏錬貌易軀瑰魄雲屑金粉玉桑長年益夀可至萬歲其次玄水雲華之漿五黃鬱靈中精千石䭀飯衆青朱英白車飛節之寶流馬紫木之黃一服使人長算千紀年隨藥進命與藥遷其次下藥松柏隂脂山薑伏神菖蒲門冬巨勝黃精菊花枸杷崖蜜伏苓桃皮澤瀉萎㽔黃連升麻地黃赤板朱黃靈飛水桂衆物之精其類煩多略舉一端服之髙可七百年下可三四百歲身生光澤還如童顔使役千神得為地仙陸行五嶽遊浪名川消魔靈藥蘇林字子玄濮陽曲水人師華山仙人仇先生五年能出入水火色如少女先生曰子真人也三元真一南嶽夫人姓魏字賢安任城人也季冬之月夜半清明聞玄中有鍾鼓之響笳簫之聲八音嘈囋出望空虛中從東方來一人太極真人安度明一人東華大神方諸音童一人扶桑碧河暘谷神王景林真人清虛真人小有仙王王子登夫人匍匐弄拜與夫人兩劑藥一曰隱遷自醫神散一曰石精金光化形靈丸服藥七日夜半之後太上玄仙遣飄車來迎夫人用景法託形劍枕從此而絶紫虛元君內傳天上仙藥若太倉之積粟絳綾朱兒丹砂也靈書紫文丹山日魂雄黃玄臺月華𧑍黃白素飛龍白石美也青腰中女空青紫陵文候紫石英碧城飛華石黛北帝玄珠消石九靈黃童石流黃五精金羊陽起石雨華飛英雲毋白虎脫齒金牙石流丹白膏胡粉倒行神骨戎鹽上學之士服日月之道思丹靈少陽真人以琉璃器盛玉泉青芝膏灌北形又以金拌盛精冶錬膏溉兆身黃氣陽精玄水玊液一名飛龍雲腴一名錬五石之華膏服之十五年身有玉光長生天地役使鬼神三年之後可夜書此方愈於錬八石之餌金勝於桂水雲毋之玉漿大洞雲草玄波者黑巨勝之腴一名玄清雌一五老紫琳之腴茅君填魂固魄飛騰七十四方靈丸服之乘空步虛紫度炎光太一四鎮丸服之萬歲九真中魏夫人耳目清明年八十三月中書道家童符存思入室百日數十日不食紫虛元君內傳地上真人先去三尸蟲有三名伐人三命三鬼不去貫穿六府搖動五神三元真一太上八瓊飛精之丹真人茅盈字叔申咸陽南關人師北朝北河鬼谷先生隱華山年十八遂弃家入恆山盈曽祖蒙於華山中乘雲駕龍白日升天其邑謡歌曰神仙得者茅𥘉成駕龍上升入太清時下玄洲戲赤城繼世而往在我盈帝君學之臘嘉平盈止恆山六年夢見太玄玉女挹玉扎而𢹂之曰西城王君有真道遂稽首靈城見王君十七年王君使主領衣書神録之章服三年乃命駕造白玉龜山諸王毋於青宫王君復賜盈九轉還丹一劑仙方一首天帝見𥙷束嶽上卿霍林司命總統吳越死生之録於是教二弟服青牙後語季偉卿宜服黃帝所授風后四扇散神方我昔受於髙上先生今相傳耳又語思和卿冝服王毋四童丹散填精𥙷腦二方皆妙二弟服藥十八年色如女子茅君內傳願玄毋與我俱食自然七寶玉𥹋金丹紫隱芝右掇五招夜光鳯腦虎沫雲琅瓊霜竒味一御則拂太虛雌一聖君引青童坐設流霞之漿赤樹白子絳水青實靈書紫文皇人為扶桑君所使領峨眉山仙官身長九尺其毛被身體居此巖下中以蒼玉為屋黃玊為牀張華羅之惟燃千和之香侍者皆衆仙玉女坐寶三人皆太清仙王設盈升之棗漱朱宮玉井之靈漿五符玄水雲華漿一名雲藏朱漿日服五合面童顔而體香九真中學道當遊日月宫殿見日月王飲以日月華金汋之漿智慧太極真人青精千石䭀飯上仙靈方服䭀飯百害不傷十年之後青精之神結以使令招致風雨一劑輒益算一千清虛真人王君內傳句曲山上神芝五種苐一龍仙芝似交龍之相負以葉為鱗根如蟠龍得食之拜為太極仙卿苐二參成芝赤色朱光瑋瑋扣枝葉如金石之音得食拜為太極大夫苐三燕胎芝色紫形如葵葉有飛燕象光明洞徹食一株拜為太清龍虎仙君正一郎中苐四夜洞芝色青寶白如李子髙三四尺葉似柏夜視其實如月光照洞一室一株九實墮地如徑七寸鏡盤著地厚一二寸夜視如牛日動䀎食一枝拜為太清仙官左御史第五白萪玉芝剖食其腦拜為三官直真御史得食此芝太上命太極真人遣五帝下拜謁署於人也其四節燕胎流明視之長曜𩀱飛夜光洞草茅君所服者乃青州方諸太極真公所植非此疇也茅君內傳太極隱芝四種或四方色光照百步一種青色如月鏡狀三重相纍髙五六寸名太極靈鏡隱天碧芝一種白色如堅斗星有七節以星為節以莖為綱髙三四尺名太極隱辰靈魂芝其一種赤色如小棗樹其實如鐶光明煥照髙三四尺名鐶綱隱玄太極金天芝一種倉色如偃蓋於地重沓周圎七八寸清名流燭髙三四寸名太極玄月經龍芝太微金簡玉字穿地六尺取鏡實一枚種之灌以黃水五合三年生草子如桃五色鳯腦芝食其實上升太極吐地化為鳯皇可乘鳯而翔一名太極隱芝靈書紫文尹喜從老君來遊登常陽山方丈之堂見九老丈人嚼九交之芝南遊登肅丘山食九光芝無上真人天鏡國風山生金玉紫芝諸天灑香華日月灌靈暉咽之五神開玉女擎金柈二十四生圖五芝香其嶺仙草茂靈條靈洞萬劫開一煥諸天交得妙安覺淹一樹沙如一朝東華中候王夫人詩曰昆池灌瓊田大洞真經玉脂芝生有玉之山玉膏流出萬年凝而成脂似鳥獸形明如水精以無心草汁和之須㬰成水服一斗得千歲靈寶芝品五嶽形圖與天地俱生置三十二天洞庭之宫上真飛仙所居其上神草玉芝令人不死黃老妙言石芝生於海隅名山有積石者其形首尾四足赤如珊瑚白如銀肪黑如澤染青如翠羽黃者如金光明洞徹如堅冰晦夜去之百步望見光矣大者十餘斤得石像芝搗三萬六千杵服方寸七盡一斤得十萬嵗亦生臨水髙山狀如盤碗不過徑尺有七孔名七明九孔名九光皆如星照此百二十種皆石芝事在太一玉策昌內記靈寶芝品木芝松脂千歲化生狀如蓮花名木威喜夜視有光帶之辟兵根如坐人長七尺刻之有血塗足可以步行水上以塗身則隱形以雜巨勝為夜以照地有金玉寶藏則光變青而下垂服十斤則千歲松脂三千歲皮中有聚脂狀如龍形名氣節芝重十斤服一斤五百歲樊桃芝木如升龍華如丹羅實如翠鳥髙五尺生名山之隂東流水上服一株五千歲大泉芝寄生大水如蓮華味甘辛建實芝建木之實生都廣皮如纓蛇實如鸞此芝混而服之白日上升靈寶芝品草芝獨搖芝無風自動莖赤如丹根大如魁升細者如雞子十二枚周繞大根根生虎夀山吳阪上似牛角長三四尺青色服方寸七則千歲麻毋芝華紫色珠芝莖黃葉赤實如李紫色二十四如貫珠白符芝似梅常以大雪而花季冬而實朱草九曲曲有三實五聽芝狀如棲莖方其葉五色如偃蓋中有甘露紫氣起數尺龍衝芝仲春對生三節十二枚凡有草芝服之或一千二千歲矣菌芝狀如室官如車馬如龍虎如飛鳥五色無常百一十種服者上升仙中者數千歲下者千歲藕實一名水芝與雞頭為隂陽以八月上戊取蓮實九月上午取藕分等隂乾百日治之正月上卯日平旦井花水服一方寸七日四五百日止除百病久服神仙五符食貨品第九海中百千洲嶼甚多珍寶定志大海中靈鳥山自然金銀珠玉硨磲碼瑙珊瑚珍竒衆寶百千萬種仙公內傳西吾之刃雖十寸而剖玉流星之金雖纎芥而徹視五符金玉滿堂莫之能守紫金十兩以誓九天傳九真明科四極明科黃金五十斤救惠百姓太清金液神丹上學之士齊金魚玉龍各一枚上金三兩以奉有經師金真玉光受洞玄靈寶真文十部妙經用上金九兩上誓九天用金龍二枚金鈕九𨾏投山水土為信明真科上仙之士記之銀編之上下仙夀歎三大神已應時五嶽地中大藏金銀玉腴琉璃大藏踊彂映朗十方八海神王於滄溟內出珊瑚之樹高五百萬里七寶花葉覆于巨海三界諸天兩細明珠五嶽開神仙山寶藏五色美玊踰於綵𥁞處胎業經琉璃之國言國土地皆琉璃推光童子隨日月與輪而轉三千六百人並絳衣下過溟海攬金精紫光之玉三皇解脫此經三界有屬諸天人民奉上香花七寶床座金銀珠玉珊瑚碼瑙元始智慧正觀解脫太微帝君解纓珞明月寶珠上道君受經昧珠三皇有金骸玊骨名書帝録得見此文當齎玉龍一枚受之上相青童君曰正月一日七月七日九月九日學士夷心寂室散香左右玉札八枚以奏三元三元者白素元君黃素元君紫素元君受洞玄靈寶真文十部妙經以紋繒五色之綵各四十九尺以關五帝明真科太上道君歎三大神巳經三界諸天兩雲錦皆有天書大乘文字處胎業經玉清隱書者髙上之訣辭玉帝之靈章傳法用青錦四十九尺金鐶兩𩀱隱書髙聖之玉訣有金名玉骨之人盟而傳之用五錦繒各九十尺四極明科金闕君以經付上相青童君使授應仙之人鳯文之羅九十尺為信受上皇寶經齎青羅九十尺以為仙盟師施五帝告真符弟子施緋羅之巾五尺以請經文髙上元始玉皇譜録雨天紋繒過於霜雪處胎業經東方青繒九十尺亦九尺南方絳紋三十尺亦三尺西方白紋七十尺亦七尺北方黑紋五十尺亦五尺四角黃紋一百二十尺亦可一十二尺四角合四百八十尺上方青紋三十二尺下方黃紋三十二尺十方紋繒之信拔度長夜之魂黃籙受三天童子玉符資白絹年一尺以誓九天之信紫書金根玄誓青布三十尺為盟靈書紫文天廚智慧觀身九宫真人無鞅數衆自然廚食不生不死安期先生見神女甚稱下官神女設酒果廚膳飲宴半日太清金液神丹上清真人東遊桑林至九老仙都之京食石腦金髓停齊七年上清三天君烈紀役使六丁靈童奉衛王毋命左衛仙童嚴整雲轡右侍玉女肅駕風與上皇五年正月一日大㑹玉闕朱宫紫殿之中諸方聖衆一時齊集天尊現以金姿日中王毋設食千萬種七寶器案太上紫書録傳北方下天廣寒國有粳米人白有珠名炎䏞著於釡下其光炎起如摩尼珠以光照米則熟四方人來共食三皇須彌山東三十六萬里有一國名純和三年一食稻糧米長三尺人長六尺其國一日三食熟粳米一曰三年一食洞淵青要帝君餐精咽氣咀嚼玄根服皇酒金液流精蘭酒金𥹋甘靈玉瓶智慧太微帝君命太極四真人設中央黃老君流霞之醴紫度炎光椒生蜀漢含氣太隂天地俱生變化陸沈堅藏勿泄不用萬金五符薑生太陽與椒同鄉含氣熒惑窈窕山間背隂向陽閉塞鬼門子能長服夀若乾坤尹喜從老君北登空峒之嶺見北華真公四華仙人髙真無數食空峒靈瓜四劫一熟西遊過大龜之山見太真王毋食碧桃紫梨玉文之棗其實如瓶復有四天王羅漢五通之士皆負圓光侍衛老子香花天妓悲笳駭空千乘萬龍躡虛東遊登日窟常陽山掇扶桑之丹椹散泉林之華無上真方諸青童設絳實丹瓜紫虛元君傳上觀瓊林條下看芝英葩仙童掇朱實神女獻玉瓜丹玄盈升之棗五符中皇諸老住太空之境食長存之杏方諸青童設玄紫㮏服日月之精華者欲得𢘆食竹笥竹笥者日華之胎一名大明蜜大洞填生五藏上卉醴華英者蜜也大洞填生五藏上上清道寶經卷之四
