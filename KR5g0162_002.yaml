front:
  text: 上清道寶經卷之二達二
  hash: sha256:9a45fc069d85e57c9d60224218460a7d64edb8c9ea391fc152c66d230efc9b6a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0162_HFL_002-001a, image: hfl/1036/1036-068.png}
body:
  text: 天品第三玄象靈文莫過三五日月北斗為三五星為五一大為天字即大一也天覆地載萬物生其中間也天地大道之常天常一天道常一道氣變為九故曰九天天八十一天天有三玄日月星也上為三精紫天精之天處太旡之中三元之氣在上景之衢三光在上為天文字災有三品一火二水三風天下無常豈有堅固大變已後四曰五曰出時江河枯大海竭復六曰出萬物皆盡譬如脂膏天地破絶隂陽九後復更生大風從他方日月天地間來持雲上第十一天上下大如兩車輪數千萬歲天雨積水上至第十一天下四面皆有大水又有大風圍守持之令不溢大風吹水數千億萬歲水生厚沫化為七寶一黃金二白銀三琉璃四水精五珊瑚六好玉七硨磲亂風吹其七寶上至第十一天上下至第十三天下造作九重天天人所居處後亂風吹水波沫凝作七寶亂風聚於天中造作須彌羅寶太山髙三百三十萬里復聚七寶水精黃金造日王城郭七重復聚二寶白銀琉璃造月王城郭七重復聚一寶名水精持上行髙四十萬里造諸天下神所居處大風制持而行之譬如浮雲名之為星大者圍四百八十里小者四十里復聚七百須彌羅寶太山四方造八重寶山黃金白銀等亂風以餘水化作厚土其上沫化作剛鐵太山髙六百七十二萬里即三皇宮大聖尊神尚不知五十有五天但説四十有九重天也分上六天寄於道氣道乃在三天之上羅天之外從下𥘉得一天名蓋天號曰清明三天最上天名太上無極大道髙蓋天號曰無上三天玉京臺在乎無上大羅之上若存若亡若有若無大羅天瓊琳翼沖玄日月煥靈幹飛天梵緑氣駕景乘紫煙鬱鬱披出文紛紛靈寶仙三清之天在三界之外仙人居太清真人居上清聖人居玉清各有自然宫殿三天大赤天號太清洞虛之氣接下品禹餘天號上清紫虛之氣接中品清微天號玉清玉虛之氣接上品出生死海登無漏山到太清岸領正法流四望玄絶故名洞玄望中之極難可宣示行玉清之道出則諸天仙衛軒給玉童玉女建五色之節駕紫雲軿十二瓊軫前𨗳鳳歌後從玄鈞六師啓塗飛龍翼輈位準髙仙行上清之道出則五宿侍衛給玉童玉女各八百人建五色之節駕龍輿飛煙前嘯九鳳後吹八鸞白虬啓𨗳太極驂軒故真中有髙下升玄有階次太元連玉清三曜洞髙明八風回晨風金映冠天精玉華結五老紫煙運霄軿乘氣蕩玄房委順拔出經逍遙上清十萬劫若諸天之一日真一自然訣竦身凌太清超景逸紫霄萬劫猶昨夜千椿如晨朝戒智弘太混玄階興扶搖三氣生三故號九天九天之根以三為尊九天之天與上三天合為十二氣第一無上元景無色天玄清上氣天玄梵玉虛天上虛赤天大梵玄元天玉空玄洞寂然天寶梵無色玄妙天雲梵流精中元天玄上無崖天大梵玄精青天紫虛上元天大梵九天中無道德天九靈氣天旡名至極梵聲天蟬然天空梵中天太極旡崖紫虛洞幽天緑梵自然天四天之音三十六天同名生於空洞元氣之先題於崑崙之山髙上音其玉文上相集其妙篇上摽玄圖中純六司三十六音下總九地三十六土皇靈篇洞暢玉音靈鮮皆天王之逰歌空玄之寶章六六韻合四四齊真九九帝分號三十六天上極旡崖旡極下極洞源洞淵諸上真飛仙不稟玉音不得逰觀旡崖之文有得其文玉書書名刻字紫札結録玉晨三十六年刻得上仙上登旡色之天下洞九地之源如銀如玉得淨色身六天魔王一赤虛天二泰清都天三浩天四太玄天五太玄蒼天六太清天混洞太旡元髙上玉皇之氣赤混太旡元上玉虛之氣冥寂玄通旡上玉虛之氣年殊號異本同一也旡光旡象旡形旡名旡色旡緒旡音旡聲積陽成天積滯成地三氣為天地之尊九氣為天地之根三合成德天地之極五行列位綱維八極天地長短上氣曰始其色正青中氣曰元其色正白下氣曰玄其色正黃太和之氣太冥在九天之上謂冥氣極逺絶平九玄唯讀大洞玉經可以交接然後玉帝乘丹霄而啓道太冥披緑霞而朗煥金墉之館既盈雲珠之庭受真矣三元宫中有三華之氣生似芙蓉之暉玄采虛空之中元辰之中有金闕其中有上景之氣氣色鬱𣡡紫煙霧焉暉照十方雲蔭金闕乃後聖之所會結氣成紫如暉丹霄映監天羅布西南回三晨明七曜列宿朗太微三一元君各有真氣結成千乘萬騎雲車羽蓋也二十四神之正氣散之則為雲霧合之則為形影出之為仙化入之為真一上結三元下結萬物二氣離合理物有期三道虧盈出處因運後聖九玄道君列紀曰者陽之精德之長德者萬物歸焉日出東方萬物亦出於東方日盛於南方日入西方藏於北方萬物皆隨之日家在南位在午五月隂氣起於內小殺也日縱廣二千三十里金分水精暈於內流光照於外其中城郭人民七寶浴池生青黃白蓮花人長二丈四天衣朱衣之服花同衰同盛日行有五風故制御日月星宿逰行皆成之梵其綱也金門之上日行通門也金門之內有金精冶錬之池在西關也左之分故立春之日更鍊魄於金門之內曜其光於金門之外四十五日乃止順行至洞陽宫是日之上館立夏日止於洞陽宫吐金冶之精以灌東井之中沐浴於景暉收八素之氣歸廣寒之官三十五日至廣寒宫是月之上館七星之華蓋立冬日伏日精於廣寒之宫一年日運周度冠帶四鄉二景離合隂陽虧盈日月者天地之司徒司空也老子磨藏中經曰姓張名表字長史三皇日月王宫殿城東西南北二千四十里城有七重間有竹木樹城有四門城中池樹有鳳皇朱雀飛鳥之類亂風造日王所居處黃金宫殿在城中央城上四面復有黃金樓閣髙下有四十里第五十天上有人來下為日天王出大光明照四面金樓生五百光明明照四方諸天人壽九百萬歲也九天真人呼日為濯曜羅三天真人呼日為圓光蔚太素天中呼日為妙景皇上真人呼日為九曜生皇上常乘明玉之輪轉宴於日中太清諸仙呼日為大明太極真人呼日為明圓皇𥘉紫元之天中常有暉暉之光薄如薄霧乃九日之所出有如一月之照耳玉賢天中呼日為微玄日月華者曜暉靈之華芒也赤氣王者日中之上神名曰將車梁知赤氣王名者不死飛上清老君呼日為太寶九華東華真人呼日為紫曜明或曰負昧日精赤圓形而方景常以一月五過於金門之上以金精石景水毋之英鍊於日魂曜精八芒也丹爐丹氣圓天育精剛以受柔炎水隂英日辰元景號曰大明九陽齊化二煙俱生凝神和魂和氣之精中生五帝乘光御形首巾龍華帔朱帶青轡烏流玄霞映上青日中青帝諱圓常元字照龍韜衣青玉錦帔蒼華飛羽裙日中赤帝諱丹靈峙字緑虹映衣絳玉錦帔丹華飛羽裙日中白帝諱皓鬱將字回金霞衣素玉錦帔白羽飛華裙日中黑帝諱澄潧渟宇玄緑炎衣玄玉錦帔黑羽飛華裙日中黃帝諱壽逸阜字飊暉像衣黃玉錦帔黃羽飛華裙日中夫人魂精內神名曖蕭臺搡九真中月家在北位屬子故十一月萬物生地下月縱廣二千九百里月暉圓七千八百四十里白銀琉璃水精映內一分六十炎光明照於其中城郭人民亦有七寶浴池八騫之林生乎其內月中之人長一丈六尺衣青色之衣月中之人常以月一日至十六日採白銀琉璃鍊於炎光之冶故月度盈則光明鮮大常以十七日至二十九日於騫林之下採三氣之華拂日月之光秋分之日月宿東井之上廣靈之堂沐浴東井之池以鍊月魂明八朗之芒受陽精於日暉吐黃氣於玉池諸天人悉採玉樹之華以拂日月之光月以黃氣灌天人之容秋分是天人會之日冬至日月伏廣寒之上館育養月魂於廣寒之池納黃氣於玉胞吐陽精於寒池諸天人採青華之林以拂日月之光月以陽精灌天人之容春分日月宿於金門之上則月通靈之門也月於金精冶鍊池更鍊於石景水毋營飾於光華灌陽精於金門納黃氣於玉泉諸天人採騫樹之華以拂日月之光日以黃氣灌天人之容夏至之日月伏洞陽宫是日之上館月之流火之庭冶鍊於八芒鮮明於日魂灌黃氣於洞陽納陽精於火宫八素真人皆採空青之林以拂日月之光月以陽精灌天人之容月姓文名申字子光三皇月天王所居琉璃宫殿城上四面黃金樓閣髙六百四十里第十五天人下為月天王出大光明轉照天下未曾休息也八騫月中樹一名藥王凡有八樹月光黃方精而圓象運回而盈度周而傾常以月五日十五日二十五日經東井之上沐浴靈暉營飾精芒鮮明黃華玄旻散王靈中真乘空鬱三素啓圎塗黃華曜朱月月中青帝夫人諱娥隱珠字苓艷嬰衣青華瓊錦帔翠龍鳳文飛羽裙月中赤帝夫人諱翳逸寥字婉延虛衣丹蘂玉錦帔朱華鳳絡飛羽裙月中白帝夫人諱靈素蘭字鬱連華衣琳四出龍錦帔素羽鴈章飛華裙月中黑帝夫人諱結連翹字渟屬金衣琅九道雲錦帔黑羽龍文飛華裙月中黃帝夫人諱青營襟字炅定容衣黃雲山文錦帔緑扶羽鳳華繡裙九星九天之靈根日月之明梁萬品之淵宫天有九氣以九星為靈紐地有九州以九星為神主人有九孔以九星為命府隂陽九宫以九星為門戶五嶽四海以九星為淵府五九參列回轉三辰調理四氣上帝兼之以通真神仙憑之以得成五行乘之以致度萬品稟之以得生天清地靜九星煥明天激地否九星翳昏璇璣召劫度之期天關運五行之氣第一天樞星陽明星之魂神也天樞威而不曜光而不照潛洞太虛圓九百二十里對陽明星之西北門其星號魁精玄上真皇夫人姓明通諱上真頭作飛雲之髻衣紫黃青錦𥜗帶九鈴之綬口吐青氣之光第二天琁星隂精星之魂神照而不煥潛洞太虛圓五百五十里對隂精星西門其星號虛精上玄皇夫人姓玄鏡諱金歸頭作飛雲髻衣飛錦羅裙鳳文錦帔帶飛靈紫綬口吐青氣之光第三天璣星真人星之𩲸精猛而不顯暉而不曜對真人星東南門其星號靈妃元皇夫人姓常明諱流爛頭達晨嬰寶冠衣飛雲明光錦帔帶六玉飛星之綬第四天權星玄冥星之𩲸精對玄冥星之東門其星號上靈神妃華皇夫人姓關生諱嬰關頭建七稱之冠緋羅鳯文之襦帶金真玉光口吐赤精氣之精第五玉衡星丹元星之𩲸靈大而不默踊而不煥對丹元星東北門星號北上金蓋中皇夫人姓元方諱勃精頭建紫晨飛華冠衣九色𥜗帶神虎玉文第六闓陽星北極星之𩲸精靈明潛照對北極之下門北洞之門也星號安上晨華元皇夫人姓王元諱冥會頭建玉晨之冠衣飛青襦羽帶流金火鈴第七瑶光星天關星之魂大明也光轉空洞回機天關上對天關星南門下對北極星星號玉華靈皇夫人頭建飛華頽雲髻衣七色夜光雲錦之裙帶九天威靈之策第八洞明星輔星之魂精陽明也光回諾天上對輔星西南門在天關之上梁北極之陽芒星號大明常皇夫人頭作飛雲華頽雲之髻衣飛羅雲𥜗帶九光之綬口吐青氣之光第九隱元星弼星之𩲸明空靈也隱息蓋之下潛光曜於空洞之中上對弼星之東南門其星號空玄變雲上皇夫人頭建飛天七稱寶冠衣青文錦𥜗帶九光夜燭吐黑氣之精陽明星天之太尉司政主非上總九天上真中監五嶽飛仙下領後學真人皆琉璃水精中有玉樹青實金翅鳥栖宿其上自生青樓玉芝食之一口夀九萬年星有九門門有四氣照九億萬里中有青城玉樓據斗真人號曰九晨君衣青羽飛裳乎執斗中之圖坐玉樓中隂精星天之上宰主祿位上總天宿下領萬靈亦皆琉璃水精中玉樓黑實自生玄芝玉胎食之壽五萬歲星有五門門有四光照九億萬里中有五色玉樓攀魁真人北上晨君頭上玄精玉冠衣玄羽飛裳手執五色羽節坐玉樓中真人星天之司命宰主神仙上總九天監五嶽靈仙中有玉樓黃華