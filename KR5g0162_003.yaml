席是時雲霧鬱勃四景冥合三日三夜玄隂不解天地無有龍漢之前天尊曰玉字煥爛障蔽天光普為四衆開天妙瑞也奉經精義或聞香煙或聞琴瑟或聞空中吟詠或見圓光如日及真人十方飛仙之異自然聰明閉塞天地神柢不復陳出瓊文帝章符暮頭當置於心即太真仙人來衛不出紫微煥七臺騫樹玉秀霞衆聖集琳宫金毋命青歌空洞靈章太霞之中結白氣以搆臺合九雲而立宇紫煙重扉神華所聚太虛元君之所處曜明宗飄天中西南龍澤山舊有三皇文男女百萬之中未有一人得生有宿命者受此文南極長生君字易度藏此經於瑶臺丹雲宫九折洞室封以鬱林之笈髙明玄洞之章蜀郡西峨眉山室舊有三皇文男女百萬黃房之室主開日月飛天真人之功諸天內音得受大洞之訣存五神於紫房聲馳於五老之室德舉於三清之上琅書瓊文太霄琅書帝君常以九月九日十月五日三月三日四月八日七月七日此五日願十會之時也上登太極瓊臺髙上玉金室之內存五願於間宫希玄旨以自降虛無啓以玉章金音暢於太空召五帝以衛靈萬慶會於日房瓊華之室外國放品緑室茅君內傳八瓊之室洞景金玄碧室上清變化七十四方三華城玉清之房名在玉城內陽安元君所處廣靈堂玉宸三元君所處元始天尊靜處間居雲宫黃房之內七寶愇中尹喜隨老子上天登九重之日門入流雲七色之房貴仙之儔喜與相禮無上真人傳南極長生君登玄溪之澗受金丹錬雲根柔金剛之經飛煙起霜沉雪之方招霞咽精之道崑崙山積石瑶房仙人所居仙公內傳顯定極風天玄都紫房主天地劫會之期諸天內音丹霄映緑房太霄琅書紫房映髙清水煙繞日月二十四生圖白玉王母入於龜山玉闕青琳宫中朱紫之房連珠寶悵仙童玉女伎樂侍衛大洞真經祕於髙上大有之天九玄玉府之內洞真玄經藏於太上六合紫房曲素訣辭五行祕符袐於玉京雲房四極明科九光華房靈寶赤書紫翠丹房外圖放品清靖者五舍也因天清而清之因地靖而靖之因日月之光而明之因星辰之行而正之因萬物之性而消息之靈音十合北元天靈鏡書太上八素道門治舍經臺之上齋堂之前皆懸金鏡石磬銅石鳴之感動羣神出太真科竺落皇茄天中北帝寒靈之窗生萬魔之精諸天內書元載孔升天中南極玄窗主得道人緑景真經九玄丈人所出傳上皇先生太上大道君封於玉經之內太上極録景真經太素在幽玄之上九宫列金門於太素之天玉門蘭室兼上清宫中門戶之名太上有瓊羽之門四明者上清玉帝之南門東華方諸青童宫有六門門內周回三千里東青華門門郎丘伯淵主學仙簿録南神華玉門門郎王祖思主真人飛仙西玉洞門門郎央少業主真仙東南天東天關門門郎五車主人宿命東北寒水門門郎重林都主鬼爽六門治天界壟山清金闕宫在三光之北相去五萬里髙上所處之東去玄羽野西壟山九千里處玉清之西與天闕連臺外有四門東王景金融門門有二王晨王執九節之麾各鎮一半髙上玉清虛皇太真之賔出入南洞寶瓊雲門主真人飛仙遊宴八極周行五嶽出入西玄京玉寶門主學仙受暑真入録籍北朔隂極雲門主真人犯退門內周回七千里紫書金根九天齊車八帝停輪搜諸鬼於玉户隂甲列於玄門洞真金玄皇曽天中日月之門主通九幽之光開長夜之府內書平育天中青華之門主衆真玉女詠五和之音文舉天中三便之門主天元數之氣門大有之關通龍漢之章七曜摩夷天中南極好生之門主生死録圖十門東方青華元陽門南方洞陽太無門西方通隂金關門北方隂生廣靈門西南元黃髙晨門東南始陽生元門東北靈通禁上門西北九仙梵行門上方大羅飛梵門下方九靈皇真門衆仙遊踐記善惡之源目黃籙簡文太上大道君告北極真公日昔遊於北天足踐華蓋手排九元逸景雲宫遊戲北玄逍遙於朔隂之館騁駕於洞豪之門盼璇璣以召運促劫會以舞輪歎萬物之雕衰俯天地而長存乃覺星綱之竒妙悟斗魁之至靈太上飛行羽章九天龍書刻題九天三關門流火之庭洞陽宫下縱廣八十萬里上清真人越明金池登曜汜庭遇玉清文始東王金曜仙公三天列紀南極長生君經於金池進禮王庭過現元始天王髙上玉皇三天玉童共處雲房之間以紫雲為屋碧霞為城黃金為殿白玉為牀上帝朝真金童揚煙百和合香流薰紫庭吐日精以却穢散月華以揚塵太上真文要解大有妙庭度人無上玉清金真誦曰雙光彂諸虛真形七氣相足踐琉璃庭玉清消魔治錬之度大洞玉經元始天尊敷五色黃金為壇白銀薦地七寶告靈傳度洞玄金書紫極祕字玉文丹章授太上無極道君二十四生圖元始丈人登紫空之上玉虛之壇受九天寶譜録上皇寶經玉符祕章玉皇譜録虛白吾宅也虛者天地之動白者神明所居老子妙真衆仙之傳舍太平經天治玄宅在地中央崇七架六間十二丈中央二間上作一層崇玄臺臺中安大香爐髙五丈常焚香煙北五丈起仙堂堂東西各一間作宴仙室大堂中央間東西二面作三間五架東為陽仙房西為隂仙房崇虛太上玄臺之南十二丈近南間起五間三架門堂玄臺大堂之前東西二面廂各一區五間五架東名青升房西名萬福崇虛北去臺一丈西南小室通明祭酒舍大臺堂下西頭一間東向戶向東西壁安坐香火天師教化常處東向太真科元始丈人在上清瓊天府龜山元録九天丈人在開清府九天元父九天之上玉寶之府九天玄母九天之上玉寶洞元之府皇老三天丈人在上清金融府三天玉童在上清丹明府九霄丈人在玉清重冥府九霄真王在玉清鳯生府三元太明上皇君在上清元真府皇上萬始先生在上清金魂府上皇先生在玉清朱映府紫虛皇老玉帝君在玉清始精府玄虛太真洞景君在玉清太