front:
  text: 上清道寶經卷之五逹五
  hash: sha256:a594e43084f21c318a74aa859da9cc2d23deed786b88087c9c1de9809d33a9cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0162_HFL_005-001a, image: hfl/1037/1037-030.png}
body:
  text: 時運品第十十方天尊明了過去如掌中物道為一切之本十方天尊了未來法如見目前天書五合之義足下開度天人大法開張澤被十方大城中東西南北四十萬里中滿芥子石亦方四十萬里天人三歲以飛衣拂芥子石取芥子盡名一劫是明胡越蠻夷之言三皇天地一成一壞謂之一劫如有山石方圎四百里中天人百年一度以羅衣拂石之消盡一劫周竟猶若是久真一自然太上正一真人三天法師張道陵日一劫如空城無人周旋四百里中髙四十里滿城芥子飛天之人百嵗一下取一枚芥子遂盡一劫之終天氣極於太隂地氣窮於太陽陽激則悖隂丕則蝕隂陽悖蝕謂之小劫天運九千九百周為陽蝕地轉九千三百周為隂悖天地敗易謂之大劫天地九年面對真人後聖君母夢玄雲日月經其形育之亦有羣龍吐水於盟器中九玄道君列紀人得靈寶經者或夢道士仙人及雲車寶蓋龍鳯或夢登仙見聖人宫室及七寶珠玉或夢上天見天王帝主惡夢祝曰黃闕神師紫戶將軍把鉞握鈴消滅惡津反凶成吉生死無緣若遇善夢既覺摩目二七叩齒二七祝曰太上髙精三帝丹靈絳宫明徹吉感告情三元柔魄天皇授經所向諧合飛仙上清常與玉真俱會紫庭資用品第十一大法之師置立七寶堂殿房宇園林浴池帳座七寶雕裝香爐法器燒衆寶香散諸名花業報動靜可觀衣服有法諸天神聖髙德之冠皆結玉素雲或七色霄霞九光精氣飛晨寶冠太上神仙靈曜元君之冠青晨玉冠太上少陽天君冠遊雲寶冠太上神仙太白素浩君冠通天之冠玄雲錦裙太上神仙無華鬱單君諱北治字停淵服玉精寶冠太上神仙寶魂魄君諱玄固字無終冠通天玉寶之冠太上通靈仙童諱靈期冠三玄寶冠太上太陽君冠文始東王金暉仙公並建扶華沓霞大冠三天君列紀道君冠九德之冠太上三天錫仙公芙蓉晨冠太極左仙公起居注上清瓊宫東極玉真帝君建九氣通精之冠髙聖太上大道君巾須臾百變之冠回天九霄經玉京真人建通陽玉晨冠丹靈少陽真人戴通精光之冠紫素元君建太真晨嬰之冠三角髻餘髮散垂腰坐太空上常有紫氣雲冠䨱元君之形寶琅扶晨羽冠太素三元君之冠太真丈人建極天無量三寶之冠皇𥘉紫元天中真人披朱錦之服巾緑霞之冠東嶽太山君蒼碧七稱冠南嶽衡山君九丹日精冠中嶽嵩髙君黃玉太玄冠西嶽華山君太𥘉九流之冠北嶽恆山君太冥靈隂之冠青城丈人蓋天之冠南嶽儲君啓明冠三天玉童建三花寶曜洞天玉冠上清變化七十四方巾者通神明也或象山林或法日月方貟大小隨位著形太霄琅書七稱珠玉幘九天元父戴紫書金根正一功曹冠朱幘神仙肉髻細髮如雲琅書太上神仙皇機玉童作飛雲角髻太上神中黃素女作頽雲髻元始天王披九色離羅之帔丹絳之裙緑華帔太極金書丹錦繡帔太上三天錫仙公太極左公起居注青童大君衣飛青翠羽龍帔靈書紫文鳳文錦帔太極公飛行羽九色錦繡華文帔無上真人內傳繡羽紫帔茅君內傳青玊錦帔絳玉錦披素玉錦帔玄王錦帔黃玉錦帔青華瓊錦帔丹蘂玉錦帔白琳四出龍錦帔玄琅九道玄錦帔黃雲山文錦帔法服有三神童侍之年十六資容端正住書生也仙公諸問專念玄宗十善為業練凡登聖南極王真赤帝君著緋羅法服靈飛六甲修行七轉七變之道上皇紫晨君以法服飛仙羽章給子之身上清上皇先生戴紫元紫霜七色冠紫房太上玄女著明月珠金闕髙上太皇左扶仙毋右扶仙公手把神鈴腰佩金鐺口詠洞真七變妙章太微帝君金簡玉字修行九霄丈人之道致紫軿飛仙洞服翠裙錦青雙璫結金符玉鈴九天帝皇命玄女歌曰飛梵鳯林表清風拂玉璫九天真女著七色曜雲冠執紫書金根髙上玉皇衣玉文明光飛雲襡上清變化七十四方九天玄毋著青神光錦繡霜羅九色襡華光十二色元始天王披飛森霜珠之袍三天玉童衣青黃七變錦袍變化七十四方朱光之袍東嶽南嶽君並服赤霜之袍茅君內傳司禁真伯上帝玉君時乘日月之軿披虎文之章上登重漠之山入宴羽景之堂濯纓帝川之池仙衣多少若大官之積布帛太平玊景真人衣玄雲錦衣東王父者清陽之氣萬神之先衣五綵朱衣歷藏中太和玄光玉女衣五綵玄黃朱衣之服青綾之裙太上神仙少陽天君衣玄雲錦裙太上神仙元華欎單裙絳章單裙太上神仙南極寶魂曜魄君衣玉真青帝君衣碧羅飛裙靈飛六甲元始天王腰帶六山火玉翠龍鳳文飛羽裙朱華鳯飛羽裙黑羽龍文飛華裙玉鈴晨光明月之鈴六山火玉之佩太上曰十方奉經真官五帝直事金光童子齊執玉板到我前後升玄陵陽監厨執笏戶東西而立謹修齋供髙上玉皇佩丹皇玉章太真丈人衣天絳九色飛雲曜光羽章玉真青帝君霄帶流金鳯章靈飛六甲丹文紫章神虎玉符帝章印印兩跖兩手心立成羽翮琅書東嶽君佩通陽光明印南嶽君夜光天真印中嶽君神宗陽和印西嶽君長津悟真印北嶽君青城文人三庭之印九天玄毋帶流蘇紫綬紫微上真天帝玉清君遣八景瓊輿來迎聖君以登上清宫賜蘂剛丹玉之璽後聖九玄道君列紀天門老子首印文心有大靈通官璽天一八極璽太清中流金鳯璽龜山元録人魄餘氣變成龍虎守人地開伏帶屣履之下九真中五色履九色履五色師子履金真玉光神重鳯舄居處品第十二崑崙山金城九重神仙兩治天首山七寶重城中有七寶殿殿上有七寶九萬層臺城周旋二十四萬里髙三萬四千里臺髙出城上三萬六千里樓觀寶郚諸天燒香灑掃大聖尊神妙行真人旋城拜侍神妙玉女繞城玄元衆周匝神龍朱鳯繞城翔注玄妙內篇山蘆國天墉城面方千里城上金臺五所玉樓十二流精之闕光碧之臺天中紫微臺主開九幽之户出長夜之魂虛無越衡天中始玄臺主天地開閉之洞紀羅八極之上道又有九夜之臺虛明堂曜天中玉京九層臺主飛天真人朝禮之典龍變梵度天中南陽上宫紫臺主得道功勳輕重之敘無思江由天則真之臺主滅度之録領更生之人崑崙玄圃臺閬風臺仙人所處太上大道君還登崚𡼳之臺九曲之房引後聖九玄金闕君上相青童君對齋三月金真玉光太上六合玄臺藏法輪妙經舊文鬱絶上真三元檢仙氣九靈隱字文西沙方臺中之書三元君紫素文則三元臺中之隱書紫微玄宫飛天檢文刻書晨燈之臺元始玄空飛天中書三元玉檢文元始王刻書晨燈之臺元始真金書九天上空隱文九天毋書之鳯生臺三元希經上皇七傳之道絳簡紫書祕於紫天玄臺玉室金房之內上清紫晨空生紫鳯臺瓊闕參太微靈鳯洞八會北牖閶闔扉髙上玉晨辭曲素訣辭苕苕天寶臺光明熖流日紫碧玄臺上清變化七十四方七寶九萬里臺玄妙內篇人皇所受皇天帝書赤玉為簡黃玉為女安之青宫閟之紫閣三皇玉清文始東王金暉仙公號曰玉皇二道君命三天君柏成欻生使登龍臺入隱室汝志形飛守太玄期紫庭而虛步天從仙才名刋金閣大洞真經龜山上有崚嶒十二傳玉樓峩峩曜晨雲流精煥紫閣出元録太清天中金華樓諸受仙真玉録者在此中也大日中有黃金樓中有書封金玉之印廣三寸皇曽天中玄都長樓之上以正天地度數主召十方衆真大神諸天內音太極濛翳天中龍山九折之河長樓之上主帝王遊觀俯仰之儀北極棄賢世界洞靈之觀方圓五十里皆金刻書字題觀四面四面無光天尊含笑五色光明從口中出照明一國四面洞徹如日中景一國歡喜靈書度命重報國王虛紫館丹室者朱火天之靈館玉完天中紫微上館罪福之場死生之門何童天中九靈之觀主天地大期文舉天中紫陽之館主風雲之氣七曜摩夷天中北靈之觀主開八書於洞穴制萬魔於天庭無上常融天中紫微上宫通陽之觀主得度之功德輕重龍變梵度天中紫微太靈之觀主得飛升之人南極長生君西遊金洞素靈之觀遇九靈金毋太素三元君受龜山元録上清變化太上大道君曰元始天王使我祕求願上法於靈都上觀四萬劫一出太上真文要解清虛元年元始天王於明霞之館太霄房下教以示三天玉童豁落紫虛館法鼓太幽髙上玉皇曰散幽九玄臺取樂階太空携契十天真嘯吟東海童四逹八會氣玄運閬臺風自朗西華館意合廣寒宫曲素訣辭元氣始凝三光開明結青黃白氣置上元三宫苐一玄都元陽七寶紫微宫苐二太玄都元黃太極左宫苐三太玄洞白太極右宫三堂瓊華之室紫翠丹房放品天帝太上治玉京山金城玉闕七寶宫室出諸天之上寂寂冥冥無上真人傳鳯城玉景臺琅書太天帝君勑使羣靈整甲齊鋒揮輪玉字遂傾蓋於霞城洞景金雲見八門中有玉城七寶瓊林上清金闕宫四門金闕在左以金為柱紫雲為蓋刻金題闕衆直飛仙之號玉闕在右以玉為柱緣雲為蓋刻玉題闕上太真之號並髙九千丈闕下有青龍白虎處在左右天獸巨虬備此左右紫書鍾山上有金臺七寶紫闕元氣所合天帝君所治五符玉帝君藏玉經於雲景之闕瓊霞之房主以太老上真侍以玄景玉童七百年中得傳三人洞景金玄飛天神王飛天翼於瓊闕四宰輔於明輪雍和萬化俯斷蒼生九天生神何童天北元玄闕主天地之氣御興廢之端七曜摩夷天中玄都玉闕主飛天開大有之光而灑自然之靈太安皇崖天中金闕立天地開闢之運始皇孝芒天中朱陵之闕匡轡九天外琅書蘭闕萬峯坦竒觀靈上有瓊子太上揮神詩此經祕於九天之上大有之宫金暉紫殿玉寶瓊房飛羅自然之帳玉几金床玉晨之童執香侍之左金華之女散煙於右太妃侍前玉女輔後玄霞紫蓋蔭乎堂宇金真光青童太君清齋三年上詣上清金闕金闕四天帝太平道君處其室左右太空瓊臺洞真之殿平玉之房金華之內侍女衆真五萬人金闕中四天帝君其後聖君處其左右太空瓊臺丹玕之殿靈書紫文靈書紫文之祕妙行真人詣上清太玄玉都寒靈丹殿紫微上宫建天寶羽服詣元始天尊請受赤書五篇真文天尊引衆真入太空金臺玉寶之殿九光真人入太空玉容者太上之明堂得道符籍之所在太安皇崖天中南宫福堂主飛天得道髙下品䄮內音淵通元洞天中華林之堂主洪水四出盈縮之度玉帝命方微天帝君列萬靈於房軒散花香於玊宇陳天鈞之廣樂散靈音於八海流運八瓊之室曲宴九林之堂洞景金玄九重之臺道德西由之瓊臺方圎百里大帝所治處大洞明真者九天之臺名煥乎九霄之上三日出焉地上呼明真曰鳳生龍山者玉清天中髙臺名金房在明霞之上九户在瓊闕之內此皆太微所館天帝之玉宇玉清天中上有三關玉臺治在西南角一名天關一名天圖一名天闕九土之生門開闔之鈕機三關之上有玉臺衆仙之所經第一天關朱門玉闕上有九層玉臺髙一千二百丈紫雲蓋其上流電曜其軒太虛玉晨監乎其虛上明著飛晨玉冠五色章帶劒佩王臺上流霞映其房日月照其堂衆仙侍真者各三百人臺上有玉格上皇太真髙帝玉名後聖真人簿録即玉晨監典第二天圖朱門玉闕上有六層玉臺髙九百丈碧霞蔭其上日月經其境太上直真玉郎字玄上伯著玄晨之冠衣九色章在玉臺上丹暉紫蓋𣡡其房百和之香虛生其庭侍者衆真各三百人臺上有金格格上有金簡玉機及紫鳯丹章十二篇第三天關朱門玉闕丄有三層玉臺髙六百丈紫雲蓋其上日月映其墻太帝監真玉司郎字無常生著逺遊冠七色章鎮玉臺之上百和之香自明之光煥其房侍者真仙三百人上有太清寶經三百卷及真人學仙簿録萬真出入太上玉京七寶流霞平育天中洞元臺主天中慶雲之暉七曜元品戒太𥘉天中華景之宫宮生九素之氣氣煙亂化彤雲九色入其煙中者易貌居其煙中者百變小有玉真天中萬華之宫玉君所治此中藏録上帝之寶經玉清之隱書小有宫大方館玉映玉晨之官貟華黃老之宫元始召賔瓊堂於赤明天中南霍之丘丹靈洞宫二十四生南陵朱宫九靈福堂有自然厨食靈書度命三十二天監仙司馬玉童玉女神仙各一月三朝於紫微宫削落地簡九幽日録何童天中金華上宫主人死生圖録太極濛翳天中南斗長生宫上清道寶經卷之五
