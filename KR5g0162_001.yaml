文也玉帝命高上直真總集實目合為衆經紫筆繕文金簡為篇皆云上皇玄上之道以傳青腰帝君太微天帝君生平始青之端紫雲曜電玄煙掩薄丹暉纒絡無幽不鑒無上不覩無下不視年行二七金容內彂玉華外映澄流九霄之霞遂受太帝之號南極總定録上真禁君以始皇元年歲在上午七月七日中時於上上無量壽天玉國七寶洞虛鳯京紫臺瓊林之下稽首玉軒虛皇道君告曰金房度命回年之訣祕在九天之上太有之金臺玉室九曲之房非中真所行此法九氣同根三光齊輪修之萬遍位加仙卿也太冥太虛太無元始元𥘉萬一火神升天降地經營六合之中散則為氣聚則為往來無門出入無間不行自至不呼而應故謂神人九幽玉匱出明真科律東方無極飛天神王長生大聖十方至真並乘飛雲丹輿緑輦億萬乘騎浮空而來香林園中為上智童子開諸法心靈寶五錬生尸東方青光童子名青上字飛正身作碧霞之色南方赤光童子名丹暉字玄紀身作赤霞之色西方白光童子名洪華字回神身作素霞之色北方黑光童子名玄明上字太隂文身作皂霞之色中央黃光童子名執巾一字黃録身作黃霞之色如黃金之精金華擎洞經捧香悉仙童嘯歌徹玄都鳴圡叩瑶鍾金光童子少野童子始元童子上清三天君列紀邪人不干正士妖不勝德天上來生清德道士正一真人演千真科鈎深致遠當稱玄靜先生或務玄先生或宣道生或暢玄先生玄古先生太上道君受其經以傳玄都仙王紫府先生年三千歲槃桓洞室上清變化七十四方經皇上萬始先生佩鳳文帶乘白雲上皇先生紫晨君蓋二暉之胤結晨之精育龍煙於太空過紫虛以通靈託九玄以含秀凝洪靈以成神陶三氣以自濯經玄母以法生住歷劫而受化感日吉而濯為上皇元年天甲啓晨誕於神州八陽之天平丘中城洞淵之濵面發金容體映玉光五色紫章七十二變精曜玉顔神龍吐芝以灌洗鸞鳯撫翼以蔭玄二景停暉於八朗七元回精於匡晨金仙散香以混氣神妃擲華以發煙五緯結絡神秀紫天餐霞咽氣吐納靈煙受號元皇位發紫晨羣仙啓路三道合明流霞吐威逸駕九玄再登玉陛三謁紫庭遊盻瓊闕要景三元携挈五老玉霄上賔金童舉雲而侍輪玉女躡虛而衛也五嶽先生受法志真太上丹簡墨綬天人上人名入太上玄録洞庭仙王别宫上人妙士呼吸玄精至學之士厲以玄科之旨南山道士鍊魄未陵聖匠玄師之法上學弟子中善弟子十轉弟子丄為飛天三景弟子已度二人得稱三景法師白日飛行飛華蓋乘羣龍登太極遊九宫太微金簡玉字隱三光白日陸沉尸解者仙品之下道大極真人飛仙寶劒上名配紫簡三官不闕其障謂戶解至忠至孝之人受下仙之教至廉至貞之才既終二百八十年進一階輔仙官德為萬物宗老君策文四德行道要之門戶獲道之典王侯高貴齎金寶受真文參經佩籙古人非心不仙末世非財不度黃金萬斤仙經一部施於窮山末世貪金豈貪經矣天科六時燒香心存日想見師如經四億萬劫真道德成名書玄格上仙品中七祖超生逍遙七寶名録簡文太素生五藏七靈入泥丸骨有五帝之玉暉面有流金之洪容肘伏師門頓首德宇墨録中篇三寶竒文四極明科太上金口四座中法金鈕一雙青繒九尺八節日奉經於玄嶽北面奏名青宫而受寶經真官靈職玉童玉女真官侍衛精誠密感心會玄都甲子日清齋入室夜半生氣時呪曰太上九靈三景元精仙都大神四極三清八願九合飛行玉清道本無形虛旡自然一師十師百師千師萬師備者為大乘之士抱蒿苗而扞火謂決誠遭厄神人誡處衆愛眷之中心在道誡之藏處憂患之心在善救之堂坐蛇虺之地心念捨逺之徑居虎豹之藪心在福德之觀太虛大旡太空是誡根本捨財遣滯救物成慈要律老子長存要律一旦持戒終身為道德之人上輔仙官受三戒五戒錬愚成智泛不死之舟九赤班符一名白羽中林飛天九符乃九元之氣飛玄羽章結成玉文得佩真符役九赤以封丘命五行以招神思水帝以削罪攝海靈以通源罪籍滅於九府生録刻於三清氣震溟滅威攝萬靈運策六甲制御天丁出五帝內真經元始五老三元玉符出玉京山紫微上宫此文同三天之元氣禳陽九百六劫會之災佩之白日升天上朝玄都靈寶赤書九成公身長九尺目圓口方聲如雷震頂有紫光左右侍女二十四人公著九色斑文裘漢文帝時公乘飛鳯雲輪遊白水沙洲空山答裴玄仁曰昨見青華奏子玉名應清靈真人舍真青宫諒不虛也子玉華玄秀名參青書吾受元始度厄寶真玉符佩之得仙役使太玄玉童五人百年有真人聽傳受經七千劫傳合有二十四人此符與九天俱生日月俱存經白刃而不傷夀萬歲而方壯備九年體生竒光太上五帝黃録五符以月下旬一日朱書空玄元始丈人自然精充玉寶符九玄元天玉虛生結精通九王符太空九天丈人玄生玉精凝靈寶真符玄虛九天真玉目然流精寶仙符空洞混化九天九父導精生天通元符向天服之十日面有五色精光九日得役使五帝玉女合五八九年上升大清五嶽仙官金房保命符誦經十遍為一過則服一枚通神致真坐見八方條理百節夀極天地三光同年九天太素陽生符玄都紫微官舊格一名八龍書靈寶赤書開心辟妄用開日朱書服之呪曰五神開心三魂攝精九嶷真人韓衆受此經於中嶽宋德玄德玄服靈飛六甲符一日行三千餘里四變之符春服東明通真變景陽霞符夏服南光八錬丹景四朗符秋服西精浩靈化景符冬服北玄鬱真錬景蕭風符右行黃帝之道以李月服黃上八經生景玉門符東明通真符東方青景陽霞開明通光之精其氣乃元之始暉映朗東天勃九十九萬億重林栖碧雞之羣上有始青之觀中有青華之宫觀有九氣元老官有青真聖君右侍青腰王女左直翠羽靈童常乘太山靈獸䇿御九光神龍以春三月下導九天之氣結氣以成號凝精以成符得咽其氣則能立都神軀有餐其精則能變化九光難可具書南光八錬符南方錬四朗之精其氣乃八天爻卦之始暉散漫八千八萬八億萬重似慶雲之鬱勃煥于太玄之庭玉津滂沱於流火之鄉太陽有激之洞流火有不死之人上有南極之臺中有洞陽之宫臺有主仙司命宫舍太和上真右侍太真玉女左侍赤明靈童常乘霍山之獸匡御九色鳯皇夏三月上導九天之氣下引絳府之明二氣交於感變變化發於微芒凝精以成文結氣以成星咽其氣靈尊降房餐其精飛行八空驅䇿六甲役使六丁西精皓靈化景扶希符其文乃西方皓靈金魂日門之精氣六濵金映之始暉明明照西戎浩浩流布六千六萬六億萬重其精落落如玉䇿光流津澳注冶錬之庭冶錬有還容之池錬仙之瑛金門則有青金丹青上有龍山神樓中有素靈之官樓有十二王仙宫舍西華真人右侍素靈玉女左衛金華之童常乘車山靈獸䇿御白帝之王秋三月上導九大之氣二氣應而交舍凝精升以成符結氣以成神咽其氣立降神顔喰其精飛行金門坐召十方興雲致龍也北玄錬景符北方鬱真玄玄簫風華晨之精其氣乃隂陽始開之暉其暉混沌乍合乍離分流散漫五千五萬五億萬重其精玄玄而相附以皂雲之沓煙合花而不曜殖五行而立玄朔隂則生錬仙玉膏寒水則有制魔之王上有七神花蓋中有度靈之堂中堂舍皇上玉晨右侍太玄玉女左侍玉晨之童常乘恆山神獸䇿御飛龜紫輪冬三月上導九天之氣凝精以成文結氣以成仙咽其氣七晨降房食其精回化隂陽實靈文之妙也黃上八經符乃中黃上神母玉門生景通明之精其氣乃天地綱維十二辰之始暉以朗八方其煙飄飄而四飛光明晃晃而混虛鬱勃衝於太玄之都經絡十二億萬之重流津溢於四季之鄉上有王京之府中有華蓋之官府有太上道主宫舍木晨之君左侍飛仙羽節青華玉女右直領仙玉郎金鈴神童常乘九墟靈獸䇿御玄上黃龍總五氣以轉辰制命十二鈎陳上導九天之源流下引脾之黃神二氣交於泥丸之上錬化混合於三丹之房凝精以變神結氣以錬仙咽其氣黃老降形餐其精色發金剛變化萬竒飛行太空此靈文妙用之難量道德為父神明為母清靜為師太和為友為虎為龍與天地同為玄為默與道窮極非善不動非和不言是以為善者自覺造惡者自刑心正無邪疑心清無纍濁太上皇帝九錬上真口舌者患禍之宫危亡之府語言者大命之所屬刑禍之所部聖人當言所懼發言而慮妙真文辭滿天地間賢聖出言與人君言惠於國與人父言慈於子與人師言愛於衆與人兄弟言悌於行與人臣言忠於上與人寸言孝於親與人友言信於交與人婦言貞於夫與人夫言和於室與人弟言恭於禮與野人言勸於農與道士言正於道與異國人言各守其域與奴婢言慎於事北方洞隂朔單鬱絶五靈玄老君姓浩字敷明玄皇之胤太清之胄始青天中年十二心玩山水千日一還於地鏡山下遇一頃苣勝採餉窮乏三年不訖死於山下九天書其陽德金格記其玉名度其魂神於朱陵之宫帝遣金翅大鳥敷大翼覆其尸七百年中至水劫攺運漂於無涯水落北壠玄丘三十年中又經山火大行受錬而起五色雲蓋其上元始賞靈寶赤書五氣玄天黑帝真文一篇或賣身供法或身投餓虎或割肉飼禽精誠感於太虛冥德合於三光太上九赤班符五帝內真精進無雙對契闊林岫法輪善開方便大慈周洽遣貪淫息瞋恚除邪愚滅三毒四施行此四事為六度之先男女各淨心意駟馬過隟比之遲也雲間迅電亦非速心之難持甚於虎豹猿猴鹿馬皆易制也善能調御心者唯上聖之人正神正心正行正身天神敬之地神衛之治心入道科術森羅始終貞信濳化導也進止和光密行教也日中一食隨身清齋金尚不可穢何況至道三竒寶文太上九真明科清水一器真珠二分書通明符著水中露於中庭一宿捉水北向叩齒三通呪曰天光氛翳五神混真丹靈悉錯穢氣彌天今日凊良止吉開陳三分飾映五芝洗塵八氣洞朗交絡我身上白下黃內外明鮮以水洗手面亦可沐浴餘水放之東流之川諸穢即消萬真存身三犯不染即修三天之道青童君口訣凡生有境清少濁多當佩破殗符九天之氣化為九鳯各首同身飛行三界引三清之妙氣蕩九地之囂塵太上蒼元上録云三時沐浴五香正月十五日七月十五十月十五平旦正中及夜半也青木香華葉五節五五相結天竺國人曰五香之草辟惡氣撿魂𩲸制鬼物致靈真此香多生滄浪之東東方神人各為青木香人燒青木薰陸安息膠於寢室以開通五濁之臭地上魔邪之氣直上衝天四十里此香之煙破濁氣之穢臭開邪魔之霧天人玉女太一帝君隨香氣中來憩子之面目上學之士服日月皇華金精飛根黃氣之道以立春日清朝煮白芷桃皮青木以東向沐浴甲子當沐浴西王母寶神起居注月一日十五日二十三日一月三取三川水一云三江一云三井水一斛雞舌青木零陵薰陸沉香五種各一兩煮之書通明符著水以沐浴先東向叩齒二十四通思項上有七星華蓋紫霞滿一室神童散香在左玉女執巾在右畢呪曰三光朗照五神澄清天無浮翳地無飛塵沐浴東井受服反形體香骨芳上造玉庭受太真訖取符沉井中此帝君沐浴上法受之元始天王傳付天一帝君帝君修行得流精紫光覆冠帝身南極上元君修得流芳上樹香聞三清太微天帝君修五方自生神芝來會帝房上聖金闕君修面生王澤上相靑童君修香充三清此道祕在南極紫房內沐浴蘭池上龍負長綆瓶金童灑香花玉女流五星冠帶濯玉津錬度五仙形體香萬神降乘景登髙清沐浴金門冠帶神暉王虛結符萬仙總歸天官僚屬遊宴