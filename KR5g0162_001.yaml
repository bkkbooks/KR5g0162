死者促死一者元氣所起一者天之綱紀必欲長生三一當明思一至飢一與之糧思一至渴一與之漿至遲不疾一安其室能晦能豫一乃不去求之不巳登彼九室天能守一覆而不舉地能守一靜而能處嶽能守一不避寒暑晦能守一流而不還人能守一必得升仙衛戒將軍二十四大神以相衛護柏成欻生請問雲房之道三真之訣玉皇白二清者一身之帝君百神之始真也若夫輔獨審正三皇內寧太一保胎五老使精一居丹田司命護生一居絳官紫氣灌形一貴洞房三素合明明堂雲官紫戶玉門黃闕金室玉城朱窗帝一之內宅三真之寶室於是雲房一景混合神人上通豈崙下臨清泉雲蓋嵯峨林竹䓤蒨七靈回轉三色纒綿層樓萬重三歲成煙玉闕虛靜七門幽深金扉玉匱符籍五篇渾一成形呼陽召隂也三一者一身之靈宗百神之命根津㳖之山源魂精之王室胃池體方以受物腦宫虛圓以適真萬毛植立千孔生咽德備天地位同太玄兩眉間上丹田官也赤子居心中丹田宫也真人居臍下三寸下丹田宫也嬰兒居合三丹田也夫頭有九官兩眉間上却入三寸為上雙丹田却入一寸為明堂宫却入三寸為洞房官却入三寸為丹田宫却入四寸為流珠官却入五寸為玉帝明堂上一寸為天庭官洞房上一寸為極真官丹田上一寸為玄珠宫流珠上一寸為太皇宫兩眉間上其中有黃闕紫戶絳臺青房共構立守寸之中紫戶大神名平靜字法王青房大神名正心字𥘉方丹田官中恆有帝君守寸恆有大神太上曰真人所以貴一為真一者止一而巳矣一之所契太無感一一之變通天道冥合上一為身之天帝中一為絳宫之丹皇下一為黃庭之元王而一之真並監統身中一十四氣上應太微二十四真真氣徊和二物成形玄神混分紫房杳冥上一真帝之極中一真王之至下一真王之妙天皇得上成皇極地皇得至上成一人皇得妙上成衆妙之居涓子授蘇林守三真元一之道告林我被帝君召輔中黃四司大夫領北海公後留一紙書云五斗三一太帝所祕精思二十年三一相見授子書矣能守三一名刋王札如存洞房為上清公加知三元為五帝君後聖金闕帝君所以乘景迅雲周行十大林以漢元帝時告弟子周季通曰我昨被玄州召為命真上卿太極中候大夫明日有雲車羽蓋參駕龍虎侍官數千人迎林即日登天冉冉西北而升雲氣覆之故三皇世人學道皆貴守一者當令心朴神凝體專誠感百念不生精意不散但有三月內視注心一神參見則神光化生纒綿五藏自朴散真二之後華偽潛興一不卒感神不即應首三一之法皇天上清金闕帝君真書之首篇髙上之至道神仙之津塗衆真之妙訣子身進退千端萬事當常念一泥九置魄營中無抱一宫丹田二靈府混合生神王三關統九大呼吸日月光五星與之滋流臣六肖先靜思萬氣歸神安形亦芳三部八景真携我入大官丹書萬卷不如安一寶齋存精修天形體而萬物育焉智士無思盧之變上皇時人深知天地之至精得天地心意不學之時若夜視玩東西南北趃於其室乘風凌空駕龍騁虛觀身清清玄道宗潛想三素官微微至道通十折九辱猶懷謙恪為一智導三元五神為二智周流八方一清一濁一沉一浮為三智晨轉九年中至二十四年上至三十二年其智四矣十折萬忍其智五色觀氣觀神觀元始知慮正觀解脫晃晃金剛軀超超太上仙知真而得真勤求而獲真神元妙接逸觀常流日華變運紫庭照軀道悟上真七靈洞符神機穎達八皇定書名奏帝堂羽籍太無身宴緑房飛行玉虛外學緣有達無內學自無通有匡轡明霞上流精曜玉支顧盻無中有混合以嬰兒戰戰如履冰劒升玄空空如也自合道真一太上紫書録籍子欲升天當行七靈既登北極又入紫庭有刻太極北璧冿字云咸陽茅盈受步剛經師法試火燒衣形口雖不言色猶天平行太極自登上清于今九十八年始輔帝皇之卿乃知鑒納之誠太微金簡玉字南嶽夫人紫虛元君內傳三界六天鬼神魔王官屬也合小道者致小神合中道者致中神合大道者致大神無者天地之元也為三界所舉五帝所明五官結氣六藏生真九府洞明太上九赤斑符研天精之妙覺絶萬纍之近想雌一五老百奏生絶宇散風和玉籟飛煙騁六轡設兹遺萬系逍遙天地之間極雲八貟之外與道為鄰矣先覺悟後覺反流歸一源勞多獲少終乖大乘四達一曰升達有金籙珠玉七寶宫殿同如玉京二曰身達體相具足金無傾三曰命逵年祚長短一委三寶四曰誡達凶吉善惡禍福苦樂物我雙忘出登三清之上無形之狀善能窺智慧行六度能超三界度九幽苦故名六一曰能勤二曰能信三曰能雌四曰能終五曰能鍊淨六曰能棄酒色消魔經故能解三羅吐納養雲茅一通之人百字不治二通之人千言不攺三通之人萬字不獲四通之人十方不易五通之人百方不拘六通之人千萬大默非斯六人不可制作不入正法皆謂邪文六通一曰眼通為洞視視於三尊不亂五色無隂無陽無小無大無所不見二曰耳通為洞聽聽受三寶不滯五音無清無濁無皎無昧無所不聞三曰鼻通為洞空無故無新無沉無浮無不知别四曰口通為洞虛願嘗甘露妙法尤丹不耆腥葷無懼無畏無剛無柔無不辨行五曰身通為洞微無廣無狹無內無外無不究悉六曰心通為洞清灌溉五神蕩滌十欲無尊無卑無道無俗無不究明染之不著以無上藥治療狂邪燒六覺之氣常通六慧天洞視地洞聽東洞空西洞虛南洞清北洞濁此子致太極玉名獨步玉京超淩三界巍巍乎太山仙公之任矣玄都所塗諒不虛也本願戒無中有妙鍊偽成真天設隂陽三皇天帝君南極上元君太微天帝君後聖九玄金闕帝君清齋三月玄思感於太寂積念啓於上清逐英停睴九纆經隱芝結秀寶光夜生淫落爽元道進明咀爵太和惠暢玉篇太上素靈𥘉來玉女非真也使之第四來王女鼻上有白玉如𥞫米許真玉玄也靈皇鑒爾之用心太極巳注子於玉札緑字紫虛之宫金書東華之閣刻名上清丹文錦籍為紫虛元君上清司命又加名山之號加封南嶽夫人巍巍大真德寂寂因無生百競煙起萬流分折玄中覺德自成聖真大運之來大權隨時受三天命為世師者皆行王法受六天命為世師者皆行龍法無大無小各有天命隨世敦化依時行藏念念在心九年精進為太素真人分形易體千萬須臾增成篇章皆致深殃琅書無無曰道義極玄玄玉京太上玉經衆經之祖太上令傳諸仙公仙王仙伯仙卿大法四萬劫傳一人吾受經成真命三積授四人并子五人矣真一自然經訣金錢傳經法信寫一通傳與一人十人百人千人卿本猶存定志百萬人中有一人得此文有仙文有仙録宿命也聽四十年傅以此文入諸名山八極周遊天下鬼神無敢富之上士升仙下士戶解三皇侍經仙童仙公請問受道不敬存師則三官笑人禪泄則七祖囚於獄身履三惡之考王侯奉經保宗廟安國家九微太真傳知惠經太極大法師不太極髙仙王無信而傳經謂之越天道無門而傳以泄天寶也法則天地何等不生何等不成法則江河淮海何水不流何川不行上有仙相中有人孝下有才明然後可受經一至之感人神同開龍漢巳來至於赤明九幽長夜得解脫者南陵官九都上格悉有其名削滅九隂氣記上東華名八道望玄霞七轉緯天經太上八素真一天之中一人成太上一人成帝君一人成老子一人成天師出三界外濟九天中仙公得道三師來度如七寶山為日所照心開意解香油紙筆奉上福田盛德君子齎金寶奉真文三洞法師一人勝黃赤道十一千丹暉映雲庭紫煙曜玉林煥爛七寶筆璀璨搖靈音宫商自相和清香散人襟積道成仙龜山丹皇飛玄紫文泡五毋所寶真道之名帝圖玉籙回天九霄白簡青籙上聖帝君受於九空結飛玄帶氣自然之字記後學得仙之名刻書廣靈之堂自非上聖莫能通讀七十年後題崑崙之密北洞之源字方一丈仙階九都之上主格玉書題得道人名學者名參青宫但無金簡玉字領仙侍郎典録玉司其能勤尚皆奏名玉皇三元東華太上當遣授其真經後聖衆真莫不先奏金簡於東華投玉札於上清然後得受大洞真經未學之徒青篇無金録之名玉格無玄文之字神經不可得披玉女不衛身矣學真人受玄清八素經皆有太帝録名西華宫有琅簡蘂書於紫宫當為真人未生前五千歲已有玄定録當遇此書八素金髓玉骨髙玄之妙道玉清之祕篇皆授金名玉字髙仙之人天王玄鑒七聖刻篇西龜定録東華書名玄圖帝簡名書青宫九天王遣四極真人下授瓊文帝章南極上元寶祕玉檢之文無金簡玉髓名録帝圖不得見篇第無金名蘭臺丹字紫房不見其文上皇民籍定真玉籙三天正一先生所佩以定得仙之名也青童君曰天籙顯於青宮氣候𧦽於軀形緑字彰於太極心神正於紫房有金閣玉名則眼有日光青齒白血其為人也仁慈而樂仙明頴而秀拔上清有金書玉籙則背有如河魁胸前有偃骨太極有丹簡青文則手有纍人倒大之字方諸有玄素紫名者則眼有四規中有紫光太清有玉籍絳名者則聲有玉音口方日圓太清有瓊簡金書者則白志於腹口中有紫氣南極有丹文紫籙者則頭生五氣上接重樓之雲斗中有玄玉籙籍丹心紫孔黃華繞胃口中香氣齒多玉液少好視日月之流霞樂星辰之光象玄都丹臺有白玉金字則青肝紫絡蒼腎綾文其膺精溢身體香軟三元宫有琳札青書者紫腦錦舌玄志鬢際緑腸朱髓方天圎額隂有伏骨孔門三關眼有流光青精凝液掌文曲菌齒牙三鍔愛水懷山寶魄養魂諸有此相必上仙也其次鼻上有玄山黑志是也又當腹有玄丘以對其山赤黑志也青骨樂聞五香之氣好學神仙之事鵠行龍趨項生忌枕耳後伏晨肺下有青志體生絡文心真膽靜耳堅氣寬玄州亦有黃金刻名之籍其次太山三宫玄録白籍有生之鄉不注有死之地太隂諸死生有黑録白簿赤丹編簡真數得六千簡輒注一人無死地景林真人語華存曰今見子之質霄景髙煥圓精重照鳯骨貫腦九色寶矅五藏紫結心有明文是以形棲辰霞神交靈肆紫虛元君內傳上清道寶經卷之一
