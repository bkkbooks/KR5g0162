席是時雲霧鬱勃四景冥合三日三夜玄隂不觧天地無有龍漢之前天尊曰玉字煥爛障蔽天光普爲四衆開天妙瑞也奉經精義或聞香煙或聞琴瑟或聞空中吟詠或見圓光如日及真人十方飛仙之異自然聰明閉塞天地神柢不復陳出瓊文帝章符暮頭當置於心即太真仙人來衛不出紫微煥七臺騫樹玉秀霞衆聖集琳宫金毋命青歌空洞靈章太霞之中結白氣以搆臺合九雲而立宇紫煙重扉神華所聚太虚元君之所處曜明宗飄天中西南龍澤山舊有三皇文男女百萬之中未有一人得生有宿命者受此文南極長生君字易度蔵此經於瑶臺丹雲宫九折洞室封以鬱林之笈髙明玄洞之章蜀郡西峨眉山室舊有三皇文男女百萬黄房之室主開日月飛天真人之功諸天内音得受大洞之訣存五神於紫房聲馳於五老之室德舉於三清之上琅書瓊文太霄琅書帝君常以九月九日十月五日三月三日四月八日七月七日此五日願十會之時也上登太極瓊臺髙上玉金室之内存五願於間宫希玄㫖以自降虚無啓以玉章金音暢於太空召五帝以衛靈萬慶會於日房瓊華之室外國放品緑室茅君内傳八瓊之室洞景金玄碧室上清變化七十四方三華城玉清之房名在玉城内陽安元君所處廣靈堂玉宸三元君所處元始天尊静䖏間居雲宫黄房之内七寳愇中尹喜随老子上天豋九重之日門入流雲七色之房貴仙之儔喜與相禮无上真人傳南極長生君登玄谿之澗受金丹錬雲根柔金剛之経飛煙起霜沉雪之方招霞咽精之道崑崙山積石瑶房仙人所居仙公内傳顯定極風天玄都紫房主天地劫會之期諸天内音丹霄暎緑房太霄琅書紫房暎髙清水煙繞日月二十四生圖白玉王母入於龜山玉闕青琳宫中朱紫之房連珠寳悵仙童玉女伎樂侍衛大洞真經秘於髙上大有之天九玄玉府之内洞真玄経藏於太上六合紫房曲素訣辭五行祕符袐於玉京雲房四極明科九光華房靈寳赤書紫翠丹房外圖放品清靖者五舍也因天清而清之因地靖而靖之因日月之光而明之因星辰之行而正之因萬物之性而消息之靈音十合北元天靈鏡書太上八素道門治舍經臺之上齋堂之前皆懸金鏡石磬銅石鳴之感動羣神出太真科竺落皇茄天中北帝寒靈之牕生萬魔之精諸天内書元載孔升天中南極玄牎主得道人緑景真經九玄丈人所出傳上皇先生太上大道君封於玉經之内太上極録景真經太素在幽玄之上九宫列金門於太素之天玉門蘭室兼上清宫中門戸之名太上有瓊羽之門四明者上清玉帝之南門東華方諸青童宫有六門門内周廻三千里東青華門門郎丘伯淵主學仙簿録南神華玉門門郎王祖思主真人飛仙西玉洞門門郎央少業主真仙東南天東天關門門郎五車主人宿命東北寒水門門郎重林都主鬼爽六門治天界壟山清金闕宫在三光之北相去五萬里髙上所處之東去玄羽野西壟山九千里處玉清之西與天闕連臺外有四門東王景金融門門有二王晨王執九節之麾各鎮一半髙上玉清虚皇太真之賔出入南洞寳瓊雲門主真人飛仙遊宴八極周行五嶽出入西玄京玉寳門主學仙受暑真入録籍北朔隂極雲門主真人犯退門内周廻七千里紫書金根九天齊車八帝停輪搜諸鬼於玉户隂甲列於玄門洞眞金玄皇曽天中日月之門主通九幽之光開長夜之府内書平育天中青華之門主衆真玉女詠五和之音文舉天中三便之門主天元數之氣門大有之關通龍漢之章七曜摩夷天中南極好生之門主生死録圖十門東方青華元陽門南方洞陽太无門西方通隂金關門北方隂生廣靈門西南元黄髙晨門東南始陽生元門東北靈通禁上門西北九仙梵行門上方大羅飛梵門下方九靈皇真門衆仙遊踐記善惡之源目黄籙簡文太上大道君告北極真公日昔遊於北天足踐華盖手排九元逸景雲宫遊戯北玄逍遥於朔隂之舘騁駕於洞豪之門盼璇璣以召運促劫會以舞輪歎萬物之彫衰俯天地而長存乃覺星綱之竒妙悟斗魁之至靈太上飛行羽章九天龍書刻題九天三關門流火之庭洞陽宫下縱廣八十萬里上清眞人越明金池豋曜汜庭遇玉清文始東王金曜仙公三天列紀南極長生君經於金池進禮王庭過現元始天王髙上玉皇三天玉童共處雲房之間以紫雲爲屋碧霞爲城黄金爲殿白玉爲牀上帝朝真金童揚煙百和合香流薰紫庭吐日精以却穢散月華以揚塵太上真文要觧大有妙庭度人無上玉清金眞誦曰雙光彂諸虚真形七氣相足踐琉璃庭玉清消魔治錬之度大洞玉經元始天尊敷五色黄金爲壇白銀薦地七寳告靈傳度洞玄金書紫極秘字玉文丹章授太上無極道君二十四生圖元始丈人登紫空之上玉虚之壇受九天寳譜録上皇寳經玉符秘章玉皇譜録虚白吾宅也虚者天地之動白者神明所居老子妙真衆仙之傳舍太平經天治玄宅在地中央崇七架六間十二丈中央二間上作一層崇玄臺臺中安大香爐髙五丈常焚香煙北五丈起仙堂堂東西各一間作宴仙室大堂中央間東西二面作三間五架東爲陽仙房西爲隂仙房崇虚太上玄臺之南十二丈近南間起五間三架門堂玄臺大堂之前東西二面廂各一區五間五架東名青昇房西名萬福崇虚北去臺一丈西南小室通明祭酒舍大臺堂下西頭一間東向戸向東西壁安坐香火天師敎化常處東向太真科元始丈人在上清瓊天府龜山元録九天丈人在開清府九天元父九天之上玉寳之府九天玄母九天之上玉寳洞元之府皇老三天丈人在上清金融府三天玉童在上清丹明府九霄丈人在玉清重冥府九霄眞王在玉清鳯生府三元太明上皇君在上清元真府皇上萬始先生在上清金魂府上皇先生在玉清朱暎府紫虚皇老玉帝君在玉清始精府玄虚太眞洞景君在玉清太丹府紫虚玉皇先生紫晨君在太清九合府紫靈三元紫精君在上清洞靈府太微天帝君在上清八明府上元太素三元君在上清九玄府三素元君在上清寳元府皇上四老道中君在上清會明府玉晨太上大道君在上清日關府中央老君在上清金珠府皇初紫元君在上清重室府無英中眞上老君在玉清紫重府虚皇君隨四時形影在丹瓊府化生府朱雀府鳯嘯府元辰君在曜華府上虚皇君在北元府上元君在八冥府元胎君在鳳舞府玉賢君在通靈府景元君在靈暉府三元君在定微府眞辰君在紫生府散花君在魁元府八景君洞清府仙皇君暘谷府司禁君仙都府仙母九玄府青帝君九生府赤帝君朱陵府白帝君通先府黒帝君北黄府黄帝君高皇府妓樂品第六天鈞大樂萬種㸦作真妃齊唱天奏百千萬妓玉京四天王人衆侍衛老子右奉香花天妓並作悲笳駭空樂所以動六方八極之氣東西南北甲乙丙丁二十五氣各有所属所以感物類和隂陽定四時均五行弦以九九次其絲然後能和合隂陽子日童女玄爽能吹笙丑日童女皇真能吹簫寅日童女幽靈能鼓琴瑟卯日童女能鼓筑辰日童女黄游能鼓琴巳日童女應丹能撞鐘擊磬午日童女司馬幸能吹簫未日童女公孫武能吹笛申日童女真金能爲九音之樂酉日童女恱能爲六變之歌戌日童女昌雲能作百獸鳴聲亥日童女公車建能爲天下新聲之曲欲作樂先生上天左宫取樂噐還一於雲中作樂未到數十里中便聞一皇金眞大神羣仙衆聖撫雲璈奏天鈞戯師子遊素麟能宛白鶴翺翔朱鳯鏗鏘八音暐曄九色簫管鍾鼓干竒萬妓大上紫書録倖諸天妓樂西王母爲茅盈命侍女石公子擊昆庭之金侍女琬絶青撫吾陵之右侍女范成言打洞隂一磬侍女苼雙成女雲和之笙侍女許飛瓊鼓震靈之簧侍女玉上華禪八琅之璈太元真人三茅君内傳西華紫妃及西王母各命侍女趙運子李慶玉撫流金之石上清太微天帝君命太微人真使成靈撫九天之鳴一金玄長齋㑹玄都鳴玉叩瓊鍾玉口方諸青童命東華玉女煙景珠擊西盈之鍾紫盧元君内傳聖君引雲鈎之琴激落百骨瓊抓九虚徹朗九霄軕大洞神州之章凝䰟之曲玄詩靈藻天韻希微紫文天尊命西華金靈上宫飛玄女景皇真人彈五命之琴鼓神州之笙空洞靈意太微帝君命太微上真使羣靈戴上之幡煥流金之火鈴五靈陳曜六度休明八音同和萬律齊聲雲璈純蚏天女羅筝金玄西華玉妃命侍女王賢擊八琅之筑玉童彈璈北華啓雪帝君彈景龍雲璈百和合唱瓊響太虚王音激無八風交真於中天五華羅仙於四隅神肖啓於琳琅之関妙韻彂於大洞之畿滅魔太極真人命比寒玉女宋聮㳙彈九氣之璈紫虚元君傳五籟聲何悲神鳯翔瓊林羣仙振羽儀太霄琅書天一以晦朔八節日擊鼓集召諸神無録者終矣老子歷蔵中九天太真曰虚鼓響鳴鍾九霄浮雲軿上清紫宸太上玉皇道君受高清無極上道隱符時王鼓震雷九暉晝冥洞真太微帝君使羣靈打碧鼓之玄英撞金折玉叩璈指瓊龍嘯虎吹鸞舞鳯鳴洞景金玄清虚真人命飛玄玉女鮮于靈金撫九金玉節紫虚元君内傳宫商空和髙下成音西妃擊節天女羅筝八音嘈囋逸響雲營𩀱皇促節鸞舞鳯翔玉佩金璫経天真帝皇命玄女歌曰仙賢遊玄圃飛梵越鳴笳三皇仙人吹九靈簫聲聞三十里中簫有四十九孔竹長三二尺九簫同唱百獸抃舞鳯皇數千來和簫聲大惠西華紫妃西王母各命侍女左抱客韓龍賔吹鳯鸞之簫上玄三天君列紀扶桑暘谷神王命雲林玉女賈屈卮次鳯戾之簫天尊命景皇人吹九鳯之簫太上玉皇道君受髙清无極上道君隱符時五霞纒曜龍文吹簫文虎奏筝大洞真南極眞人詩曰鳴絃玄峯嶺金簫運八氣奚不含靈酒盻目娱九裔衆真歌龍嘯萬響同唱虎吹鸞鳯齊聲龍景九文紫鳯赤書太微天帝君曲宴瓊室歌紫虚之靈辭浪微音於太玄洞景經元始天王授南極司命君上清變化七十四方於雲房之間時三元真玉上元無英帝君歌上元洞門變真内章之曲三素流五河雲轉九嶺阿朱靈啓碧室金暉煥東霞三辰朗太虚瓊門纒曲宇散靈九度外同此萬劫庭中元黄老帝君歌中元洞化内真章曰落落三真布分流九雲氣瓊室森太霞金郷洞幽藹玉臺霄上玄流精曜紫盖合真三丹府散靈九貟外下元白元帝君歌下元洞靈化真章曰峨峨太霞闕金門纒九重丹暉曜瓊天飛霄鬱玄梁散氣九靈戸分爲萬帝宫洞化丹靈窟八景可飛空寂寂綵霞生遂起萬仙宗上清變化七十四方西華紫妃及西王母各命侍女辛白鶴鄭辟方燕婉來田雙連四人各歌髙仙盼遊洞靈之曲四首曰玉室煥東霞紫輦浮絳晨華臺可盻目比宴飛天元玉臺霄上立金華帶靈軒七闕煥流霞瓊室生龍雲左廻三素㘘右鼓萬流津手把八素氣縱身虚中浮左把玉華盖飛景登七元重霄煥紫暉四向皆以神玄心三元中一劇年亦分上青三天君列紀太上命玉清上宫侍女季雲門田四非合歌寳洞飛霄絶玄曲曰控轡玄霄上龍翰秀金城飛煙繞曲宇紫鳯曜玉京飛香揚流煙蓊欎灑八荒乗暉絳琳房執契玉暎堂上攝西華女嘯命金晨重龍景九文紫鳳赤書太極真人歌丹明煥上清八風散太霞比採日中精下飲黄月華靈觀空天中瞗路無間邪方諸青童君歌曰太霞扇神暉九氣无常形玄轡飛霄外八景乗髙清手把玉皇袂𢹂我晨中生盼觀七曜房玄玄亦冥冥起哉魏氏子金書東華名扶桑神王歌曰晨啓太帝堂九龍同轡起清虚真人歌曰駕歘控清虚徘徊四華館瓊輪暨晨抄虎斾逐煙散惠振風丹旌明燭朗八煥栖景若林柯九絃玄中弹遺我積世代釋此千年歎紫虚元君内傳王母命侍女于苦貧李龍孫歌玄雲曲二首曰太象雖云云我把天地户披雲液八景倐忽適六土頥神三元中納精六闕下遂乗萬龍椿落鳯盼九野玄圃遏北臺五城煥嵳峩啓彼無涯津泛此織女河仰上昇絳庭下遊日窟阿顧盼北落外指㸃九空霞静思感中和爲是玄虚歌茅君内傳玉女𥥆窕而流舞翩翩詵詵而容裔玉京山經上清道寳經卷之三
