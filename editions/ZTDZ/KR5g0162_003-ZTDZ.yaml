body:
  text: 死生品第五在胎九月九氣結形形成神具十月誕生九天稱慶太一執符帝君品命司命定筭五帝監生人禀太和隂陽之氣受五行性玄妙内篇九天丈人告三天玉童曰二象含真上應九玄流丹九轉結氣爲精九天之精化爲人身仙胎精懷胞六智法象五靈其三萬六千神人爲道德之室宅神人戒五道神形老子本生間關三道玄液七経日月暎於六虚口目運其神器人道如此雲行雨施五因成具五因五神也三道三真也即三一之尊神太一名務猷收字歸會昌知者長生却萬禍玉女來降三元上氣之神左無英公子也魂魄生於九靈之宫神液運於三氣之真主之者號白元洞陽君一名朱精中央司命或曰制命丈人一名神宗一名靈華命門桃君者天地之資元隂陽之靈宗金玉之關房戸之寳並制命於桃君之氣三五渾合化生五神禀五氣之大靈符命之玄宗一切含氣禀倉元而生倉元上録六塵色塵青黄赤白黑眼所得聲塵官商角微羽耳所得香塵羶焦香腥臭臯所得味塵苦甘辛酸醎口所得觸塵軟澁輕重堅滑燥濕冷煖身所得法塵能生心識若諸心反塵五體爲别識得名别諸塵云云四大地水火風四法合成於四塵故名四大六家甲寅木神爲毛骨甲申金神爲齒爪甲戌土神爲肌肉甲辰風神爲氣息甲午火神爲濕煖甲子水神爲潤澤六合共成人一身木神爲肝火神爲心土神爲脾金神爲肺水神爲腎風神爲膽故有五藏六府九宫十二室百八十關機三百六十骨節四支五體三焦六軀以象天地玄妙内篇六根耳目鼻口身意西昇五根元始智慧正觀觧脫五物和合成假名人瓊胎紫戸九丹上化於胞胎之中法九天之氣紫絡結胞宿命挺仙太霄琅書曰母者玉清之老母主胞胎之尊神大洞玉經紫素元君託瓊胎於紫胞含虚秀於玉户天尊大聖元見受生所處瓊府内外明徹處胎業報二十八重果化體出自然七月漸變形十月具音聲雲霧子元皇氣虚之胤大帝之中子抱瓊胎於玉房結雲精於金門含日月於紫胞變洪露以凝神上皇九年三月一日天暉啓晨誕於九玄之上寳曜無量之天覩太陽於雲崖曜金容於瓊軒順皇基於帝圖法玉秀於自然濯以九靈之暉灌以甘香玉泉食以七色靈芝哺以九錬飛霜神龍翼其側瓊鳯䕃其顚紫煙生乎上流光欝於隣二象捝其剛三辰協其真神州歌其妙七轉變其神虚風迅其軀廻香蕩其塵蕭蕭太虚之上靡靡洞波之濱太霄琅書道根九天元父形長七千萬丈春建玉㥽著九天鳯衣雲鳯舄常乗碧霞飛輿從十二飛龍夏著九日衣赤鳯斑文虎裝秋帶温鋋龍淵之劒冬化爲日精之光與紫暉相沓合變混沌二象之氣道極九天玄母長七千萬丈從十二鳯皇三十六仙人銜月精乗十二色雲也玉靈仙母太上告青童曰上相赤光之前與我俱生國王之門九宫真人本行八景齊真九帝同明南越浮利北落寒宫慶雲重玄四違交通靈嶽非常宅飛雲是我龍琅書朋友皆真人玉童爲家騰身太清中太上之賔客也獨步三界五行氣戰三光失度隂陽忿爭八節乖錯故病害萬種上古之人獨得天地之心意中古人半得下古人不待身内三十九戸上清三天君列紀輪轉三塗往五道共經死路悠悠冥冥太清真人尹喜眼有日精頭負圓曜五藏有文面有七星上象天文下順地理乃元上真人内傳云也頭中有九宫五嶽仙伯腦神青衣從千乘萬騎長一寸二分太上紫青左元君守頭面境使萬邪不侵眉神元光大靈君也老子歷象中眉者白元之華蓋太上素靈帝君一名七靈一名神文人守眉間大洞真經目神守道童長三寸衣五色金真玉光左目童子字玄光右目童子字英明目者太一之日月太上素靈右目童子諱晨嬰洞觀天關監帝庭豁在三晨乗運征左目童子諱飛靈玄微無窮覩玉精赫若天威放流星寳曜經鼻名山源一名鬼井一名鬼池一名邪根一名魂臺大洞真經臯者三元之丘山口神天一君字丹朱爲明堂宫口者絳宫上朱淵素靈舌神道岐精長七寸朱衣齒者胃宫之威力素靈舌者元英之龍轅太微小童對帝真安鎮舌下通液源寳曜耳神嬌女又名玉堂宫九玄之真諱緫制鎮在右耳神聦惠竊響萬里入無際宫宅欎欎仙皇位教兆度命合符契皇一之䰟諱上歸鎮在左耳總萬機三合成一齊光暉耳者帝君之聽門聞金聲玉音者真氣來入聞絃樂之聲者六丁玉女來衞也太一尊神歸㑹昌守我玉枕大洞真經丹皇運珠絳宫神上填項中大槌邉黄素中元君名圓華黄刃守我胷腹之境鬼魔伏制三尸滅形一真天精神靜安鎮在胷中統生間悉衣錦衣飛青裙爲兆度命塞死門含景叅九玄下鎮背景集中田齊神子靈又名崑崙又名大淵左無英公子字合符子一名元素君一名神公子守我左腋下肝之後户右白元洞陽君一名朱精一名啓成守我右服下肺之後戸大洞真經兩脇神字道成長四寸一分掌神太陽之精字魄上日中司命諱接生鎮兆右手四大名五華保真置靈營仰日月咽元精日中桃君諱方盈鎮兆左手運斗星把持天岡御五靈歴度四十緯天庭迴三匝九洞清明足神太隂之精足者腎元之靈關存足底各生兩白龍在我左右九真中喉神名百流放字道通五真養光法三天鎮兆喉内執妙篇胎中一元務玄子太一精䰟玄歸子鎮兆五藏命不死肺部童子諱素明鎮兆肺戸内外清遊䰟散魄付黄寧心如猿猴又似熛火太上八素真經心爲陽機真人入山要太一五神一共混合變爲一大神在心中號曰天精液君南朱布真絳雲徘徊練變五道四節虚飛流真敬靈神灌八圍赤子𢹂景萬神總歸心府納精五府明開道合成仙四體輕飛五帝俠䁐升入紫微龜山元録絳宫心丹田宫中一丹元皇君神運珠字子南丹一名生上伯一名史雲拘膽爲紫房宫神名龍德拘也七真陽度命年鎮兆五藏大胃中朱英玉芝自溢充太陽煥精玉桂通明六氣流布豁詠朱庭氣府間真六胃華生血中赤氣君司命精䰟二神共守百關之血也金骨玉名紫字上清得備招靈招靈之符豁落七元之符也骨節第三真名堅立君字疑羽洙太上叩齒七通爲十曜道五嘘爲欲斷衆生五苦昇玄經叩齒大鳴天鼓招天真會羣仙也左鳴天鍾右擊天鼓辟鬼災百福至太極隱注寳訣一呼一吸三叩爲善彈指召十天昇玄行山採藥一歩一謦欬元一天尊勑玄一二君可開紫羅七歩妙光玉府中演出定生金章授虚皇元髙道君等讀河上真人一章則徴太上玉京諸天仙人义手稱善禮東華青童北向三拜求所願神仙事丁卯日禮壽骨日生仙道日成法師㫖教天尊命九天司馬出九天生神玉章四輔列位五老監真太一命玉帝唱盟南向長立以付飛天無極神王天尊授太上道君經東西二華南極北極二聖真公侍衛太真王夫人執十絶靈旛立下方侍經玉郎立左監度司馬立右九天真王執九色節正於中央元君廻信三轉萬神齊到真王東向轉節三廻稱善天尊起諸天大聖真人玉女一時同禮金籙簡文天真降道氣明謁三元朝玉清登其臺覩神形天尊仰天含笑有青黄赤二色氣口中出光明徹照十方無幽無隱金書紫字王文丹章煥爛三氣之中三八景神二十四真各從千乗萬騎在空玄之上輔衛靈文二十四生太上髙玄真人曜金顔而含笑遊行躡雲綱乗虚歩玄紀渉塵載劫元始智慧正觀解脫太上道君坐大蓮花諸天真仙一切大衆各各生諸蓮花一一葉間十方國土各於中現一一花内各現其國城朝宫殿道所以繩天正地白虎居西元氣居北東方青帝君往常諱精萌衣音帔碧錦飛裙帶翠羽交靈之綬乗碧霞九龍雲輿從青腰玉女十二人手把青林之花九色杖幡㳺行東嶽南方赤帝君姓炎諱洞丹衣緋雲錦袍丹文之裙佩南極符帶朱宫八光劒乗赤霞飛輪從太丹玉女十二人手把日精三氣之花遊行南嶽西方白帝君姓混諱㫖歸建七氣光明斑冠衣白錦雲光袍素錦飛裙乗素雲飛輿從太素玉女十二人乗十二白虎遊行西嶽北方黒帝君姓玄諱朔萌衣玄錦袍帶文身神通劒乗雲飛輿從太玄玉女十二人飛龜遊行北嶽中央黄帝君姓麻諱忠順衣黄錦袍玄黄飛雲錦裙乗黄雲飛與從黄素玉女十二人乘十二飛麟皇上玉帝佩金虎鳯文帶神虎玉章光明玉洞之中兩手把斗星在華蓋之下立紫霞之上在紫虚中龜山元錄也真君出世鳯凰爲家雞麒麟師子爲家畜大㑹欲至出真人都會長安洛城西當會黄河益澤之邉也心是人之聖王天地神也與日同氣居五藏之中至尊也元始天王生乎空洞之際七千餘劫天朗氣清二暉經絡玄虚紫盖暎其字六氣之電翼其真獨秉靈符之節瓊輿玉輪君輦玄龍精流蕩曜電虚宫東遊碧水豪林之境上憇青霞九曲之房遥登金闕受號玉清太極天子小爲百官揖讓而昇天下正中央一天子第九天王當下化生爲天子天下幸甚莫不歸王混沌爲一上德之君綱爲帝王紀爲皇后九皇上真君上清之典禁主玉華三元君太一上元君萬仙之司主方嶽之真氣除死簡刻書生簡白素元君寳五蔵道著龍文白錦帔頭著紫盖芙蓉冠黄素髙元君形有黄金之質頭著紫華芙蓉之冠紫素元君著虎錦紫華帔紫龍文裙申紫辰芙蓉冠紫辰雙珠蓋上元夫人三天真聖之母統領十方玉女之名綠服赤霜之袍帶六七火玉執流黄揮精劒茅君内傳紫微夫人姓王諱清娥是西王母第二十女紫微宫在北漠外羽明野玄壟山山在崑崙山東北紫微說王母言曰圓形而方景方精而貟柔景藏形内精隱象中景赤象黄是日月之魂若知其道可以吐納流霞服日氣以平旦採月華以夜半存之去面前九寸令光景照我泥丸下及五藏洞徹一形太上隱書洞真玄經中候夫人是徊風大混合師紫微夫人是大洞真經師夫人一稱小童言童蒙小識憑大君也後聖君大師彭君立相方諸宫青童君上保太丹宫南極元君上傳白山宫太素真君上宰西城宫緫真王君一師四輔輔者左輔右弼前疑後丞四五占候總與輔師神人治真人爲臣真人治仙人爲臣也上古帝王聖人爲臣用聖人之言者與天地同徳與神靈合心天大將軍姓王名陽字子靈衣絳單衣老子歷藏中經左將軍姓唐名宏字使明長七十二丈赤㥽大冠左手持金符將兵三千萬衆老君五千文中將軍姓周名武字文剛長八十一丈左手執玉陽之節將兵三千萬衆右將軍姓葛名雍字文度長七十二丈右手執玉㦸將兵三千萬衆青龍將軍長八十一丈布弓布箭黄庭將軍長七十二丈把持魁岡白虎將軍三十六丈捧張弩也熒惑將軍六十四丈吹鳴角玄武將軍二十五丈搥鍾鼓太微帝君命太極仙撫九華鳴鍾位及仙郷三皇侍經仙郎王思真孔文期劉文静受太極真人命出太上真一自然經虚上三天玉童衣青黄七變錦袍坐十二色雲百變之光手把九節金杖其光纒繞如日月之暉子日玉童玄英丑日玉童童微寅日玉童幽昌卯日玉童光由辰日玉童黄水已日玉童夜舒午日玉童司馬勝未日玉童公孫曜申日玉童夏赤酉日玉童馮季戍日玉童台欣亥日玉童公車盈元録金辰玉童法輪太上神仙洞天元洞太陽曜靈南極丈人絳宫玉童諱上玄字升虚太上素靈玉晨之童三千人侍衛三元経玉清隱書萬靈隱書髙上玉帝藏之玉清上宫瓊房之内衛金仙玉童侍香等五百人執光寳明玄散三氣反香之花金玄羽章玉女翠朱瓊𢹂景入金房内二十四生圖娥容太丹玉女頭作頽雲髻衣朱衣飛裙上宫金華玉女七百人侍衛仙母使治流精紫闕金室瓊堂一月三登玉清再宴崑崙五嶽衆仙甲子玉女諱靈珠字承翼乙丑玉女諱蘭修字清萌丙寅玉女諱之華字鬱陵丁卯玉女諱須臺字馥猷戊辰玉女諱愛停字衆梨己巳玉女諱四浮字寧華庚午玉女