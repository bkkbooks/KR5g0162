女左直翠羽靈童常乗太山靈獸䇿御九光神龍以春三月下導九天之氣結氣以成號凝精以成符得咽其氣則能立都神軀有飡其精則能變化九光難可具書南光八錬符南方錬四朗之精其氣乃八天爻卦之始暉散漫八千八萬八億萬重似慶雲之欝勃煥于太玄之庭玉津滂沱於流火之郷太陽有激之洞流火有不死之人上有南極之臺中有洞陽之宫臺有主仙司命宫舍太和上真右侍太真玉女左侍赤明靈童常乗霍山之獸匡御九色鳯皇夏三月上導九天之氣下引絳府之明二氣交於感變變化發於微芒凝精以成文結氣以成星咽其氣靈尊降房飡其精飛行八空驅䇿六甲役使六丁西精皓靈化景扶希符其文乃西方皓靈金魂日門之精氣六濵金暎之始暉明明照西戎浩浩流布六千六萬六億萬重其精落落如玉䇿光流津澳注冶錬之庭冶錬有還容之池錬仙之瑛金門則有青金丹青上有龍山神樓中有素靈之官樓有十二王仙宫舍西華真人右侍素靈玉女左衛金華之童常乘車山靈獸䇿御白帝之王秋三月上導九大之氣二氣應而交舍凝精升以成符結氣以成神咽其氣立降神顔喰其精飛行金門坐召十方興雲致龍也北玄錬景符北方鬱真玄玄簫風華晨之精其氣乃隂陽始開之暉其暉混沌乍合乍離分流散漫五千五萬五億萬重其精玄玄而相附以皂雲之沓煙合花而不曜殖五行而立玄朔隂則生錬仙玉膏寒水則有制魔之王上有七神花蓋中有度靈之堂中堂舍皇上玉晨右侍太玄玉女左侍玉晨之童常乗𢘆山神獸䇿御飛龜紫輪冬三月上導九天之氣凝精以成文結氣以成仙咽其氣七晨降房食其精廻化隂陽寔靈文之妙也黄上八經符乃中黄上神母玉門生景通明之精其氣乃天地綱維十二辰之始暉以朗八方其煙飄飄而四飛光明晃晃而混虚鬱勃衝於太玄之都經絡十二億萬之重流津溢於四季之郷上有王京之府中有華盖之官府有太上道主宫舍木晨之君左侍飛仙羽節青華玉女右直領仙玉郎金鈴神童常乗九墟靈獸䇿御玄上黄龍總五氣以轉辰制命十二鈎陳上導九天之源流下引脾之黄神二氣交於泥丸之上錬化混合於三丹之房凝精以變神結氣以錬仙咽其氣黄老降形飡其精色發金剛變化萬竒飛行太空此靈文妙用之難量道德爲父神明爲母清靜爲師太和爲友爲虎爲龍與天地同爲玄爲黙與道窮極非善不動非和不言是以爲善者自覺造惡者自刑心正無邪疑心清無累濁太上皇帝九錬上真口舌者患禍之宫危亡之府語言者大命之所屬刑禍之所部聖人當言所懼發言而慮妙真文辭滿天地間賢聖出言與人君言惠於國與人父言慈於子與人師言愛於衆與人兄弟言悌於行與人臣言忠於上與人寸言孝於親與人友言信於交與人婦言貞於夫與人夫言和於室與人弟言恭於禮與野人言勸於農與道士言正於道與異國人言各守其域與奴婢言慎於事北方洞隂朔單鬱絶五靈玄老君姓浩字敷明玄皇之胤太清之胄始青天中年十二心玩山水千日一還於地鏡山下遇一頃苣勝採餉窮乏三年不訖死於山下九天書其陽德金格記其玉名度其䰟神於朱陵之宫帝遣金翅大鳥敷大翼覆其尸七百年中至水劫攺運漂於无涯水落北壠玄丘三十年中又經山火大行受錬而起五色雲蓋其上元始賞靈寳赤書五氣玄天黒帝真文一篇或賣身供法或身投餓虎或割肉飼禽精誠感於太虚冥德合於三光太上九赤班符五帝内真精進無雙對契闊林岫法輪善開方便大慈周洽遣貪滛息瞋恚除邪愚滅三毒四施行此四事爲六度之先男女各淨心意駟馬過隟比之遲也雲間迅電亦非速心之難持甚於虎豹猿猴鹿馬皆易制也善能調御心者唯上聖之人正神正心正行正身天神敬之地神衛之治心入道科術森羅始終貞信濳化導也進止和光宻行教也日中一食隨身清齋金尚不可穢何況至道三竒寳文太上九真明科清水一噐真珠二分書通明符着水中露於中庭一宿捉水北向叩齒三通呪曰天光氛翳五神混真丹靈悉錯穢氣彌天今日凊良止吉開陳三分飾暎五芝洗塵八氣洞朗交絡我身上白下黄内外明鮮以水洗手面亦可沐浴餘水放之東流之川諸穢即消萬真存身三犯不染即修三天之道青童君口訣凡生有境清少濁多當佩破殗符九天之氣化爲九鳯各首同身飛行三界引三清之妙氣蕩九地之囂塵太上蒼元上錄云三時沐浴五香正月十五日七月十五十月十五平旦正中及夜半也青木香華葉五節五五相結天竺國人曰五香之草辟惡氣撿䰟𩲸制鬼物致靈真此香多生滄浪之東東方神人各爲青木香人燒青木薰陸安息膠於寢室以開通五濁之臭地上魔邪之氣直上衝天四十里此香之煙破濁氣之穢臭開邪魔之霧天人玉女太一帝君隨香氣中來憩子之面目上學之士服日月皇華金精飛根黄氣之道以立春日清朝煑白芷桃皮青木以東向沐浴甲子當沐浴西王母寳神起居注月一日十五日二十三日一月三取三川水一云三江一云三井水一斛雞舌青木零陵薰陸沉香五種各一兩煑之書通明符着水以沐浴先東向叩齒二十四通思項上有七星華盖紫霞滿一室神童散香在左玉女執巾在右畢呪曰三光朗照五神澄清天無浮翳地無飛塵沐浴東井受服反形體香骨芳上造玉庭受太真訖取符沉井中此帝君沐浴上法受之元始天王傳付天一帝君帝君修行得流精紫光覆冠帝身南極上元君修得流芳上樹香聞三清太微天帝君修五方自生神芝來㑹帝房上聖金闕君修面生王澤上相靑童君修香充三清此道秘在南極紫房内沐浴蘭池上龍負長綆瓶金童灑香花玉女流五星冠帶濯玉津錬度五仙形體香萬神降乗景登髙清沐浴金門冠帶神暉王虚結符萬仙總歸天官僚屬遊宴