body:
  text: 經品第一黄錦爲地丹金書之紫金界之盛以錦囊上古經書中古下古若有此文則五帝營衛玉童玉女各三打人持書左右九星玄覆衆真神仙五岳靈官日夕臨其房天皇内文可以鎮宅三皇赤書五篇鍊於洞陽之館台於流火之庭生天立地開化神明天子得之鳯皇來儀五星合度諸侯得之列宿含光王俟庶人得之玉質鏘鏘婦人得之顔若太陽色流三光后妃君王飛入雲中真文玉檢之文出於九玄九天分制三道天无此文則三光分翳五帝錯位九運翻霞七宿奔精地无此文則九土淪䧟五岳崩裂山河倒傾三元之法緫合靈篇大洞真經三十九章此乃三五之祕號真道之至精三一之極章玉清之禁記三竒之章玉皇寳章祕在九天之上大有之官大玄靈臺玉房之中三籙三元品誡金籙黄籙玉籙三經三過監受三洞玉清洞真上清洞玄太清洞神大洞真經上清之髙音極真之微辭靈寶經髙仙之上品虚旡之至真大道之幽寳三皇之天文或云太上玉策此三洞經符道之綱紀太虚之玄宗上真首經豈中仙之所聞洞神名仙寳之道接三皇之世洞玄名靈寳之道救度五帝之世洞真名天寳之道濟三代之後七部十部妙經元始以龍漢之年撰太上紫微宫中金格玉書乃上聖之祕文赤金書青玉簡太上玉訣三十六卷十部經皆刻金書字書於玉簡題其篇口於紫微南軒太玄都玉京五帝承符導引三光五帝執符萬定錄君子終日不視視亦無見終日不聽聽亦无聞玄都正一之化正一真人演千真科經太上無言君子終日不言言亦无所道善述者必通其言必通其意真人以神聽聽可尊也聖人以身教教可珎也聖誥言有必無子未能别言無必有子未能决道有真僞福有㐫吉罪有公私明有纎宻世三人仙人紀法成等貴賤相使賢愚相傾善惡相顯无彼无我无去无來彌綸萬劫一切虚空星宿不可得之數者則我成道得仙巳來亦復如是虚空不可步度知其里數者則我夀命亦復如是以法爲源洞玄昇玄皆是天地之人物本皆是道无髣髴之精光微妙之上玄黙念非空不非空非法不非法非物非非物非人非非人非因非非因非果非非果非始非非始非終非非終了了昭見成无上真兩半成一有无爲兩牛不有不无爲一正道離此四半還豋不虚了无非无知有非有安住中道正觀之城反我兩半處於自然道業日新念之增益覩見法心心相得見引道清風蕩俗塵累太上重鳴天皷三十六通仰天祝曰山川水陸一切幽靈三界魔王六宫魔王有國王王子能受持經即當合力同共寳護混沌無形之中開闢之先天之所報不疾而速感之所期不行而至金闕上聖命太極真人使正一上玄玉郎王忠鮑丘等與茅盈四節燕胎流明神芝長曜靈飛夜光洞草佩璽服衣冠北首畢四使者告盈曰食太極四節隱芝者位爲真卿食金闕燕胎玉芝者位爲司命食東宫流明金英者泣爲司禄食長曜靈飛者位爲真伯食夜光洞草者位爲主緫左右御史之任子巳盡食之矣壽與天地位當爲司命上真東嶽上卿君都統呉越之神仙綜師江左之山源須㬰五帝各乗方面色來從羣官來下受大帝之命授盈爲司命東卿上真君文以紫玉爲似初文刻之曰惟盈爰自童蒙散髮北山情招上帝感激太玄今授盈太玄真人司命神君君秉操金石丹心矯衆今報以玉越緑旌八威之策使征伐源澤折衝萬神君寒東林谷今報以紫髦之節藕敷花冠招驅千靈封山召雲君弃家獨往故賜繡羽紫帔丹青飛帬使從容霄階擕命玉真君步驟深藪故報以班龍之與素虎之軿使浮宴太空飛輪帝庭君寒露霜雪故報以曲晨寳盖瓊帷紅室使遊盻九官清静温宻君潛形幽嶽精思萬林故報以神流火鈴𩀱珠明月可以上聞太極通音上清君真心髙靜故報以錦旌繡旛白羽玄竿則可以呼召六隂玉女侍軿君慈向觸物隂德萬主故報以鸞鳳之簫金鐘玉磬可以和神虚館樂真舞靈君萬物不能散其感千邪不能侈其淳故報紫琳之腴玉漿金甖可以壽同三光刻聞丹瓊盈心暉重離神躍太霞買人之長者故以太元爲號九德旣備今酬九事給玉童玉女各四十人令出入太敬受事太極治官赤城玉洞之府動靜以聞盈伏受書稽首再拜太元真人茅君内傳前天後天一始一終小劫太劫功書玉劄白日登天欲得苦海傾常使愛河竭道無形狀假言象以爲津中和者事之源正中之正遣無所遣得無所得倚伏兼忘忘其所忘頓首經師之牖乞啓重玄之闕等開實相俱入玄門譬如玄都玉城開於八門八方之人各隨門入諸天實蕩蕩萬道同一歸二盡猶二死界内有大期之死界外有念念之死根太極與仙公起居注超踰二死界過度三清基天老請問玄名青籙白簡隂陽之妙道服御之至術皆神方秘訣也汝昔所聞未爲見也當今所聞乃爲是聞天上天下皆得光明地皆琉璃七寳行樹夾路兩邊一一樹下皆有仙童玉女手執香花虚空神仙作萬種妓樂一一國圡皆有太上神尊處七寳臺坐金床也法輪妙經從無央數中來如有𢘆河之劫如是星普曜此經如月盛光照曜十方猶如三界暗暝是經如日之出普照諸天猶如萬川之流是經如湯谷之淵爲㠯海之源無不歸宗猶如須彌之高是經如玉京之山無不包蔵上理三光中調隂陽下開萬生修行是經不倦立致龍駕白日飛行道德經其德若春以生萬物若夏以養菊物若秋以威萬物其德若七寳萬物𤤽之若明鏡照萬物若大國無不備有若山萬物所依若海藏有萬物若月暎照萬物若日光照萬物其德若地厚載萬物若天廣覆一切故能彌綸天地生四時上經爲天下經爲地心如琉璃太上决疑上無不照下無不通通直達靈靈寳囿大法橋示之以道導之以法令免三災八難之中開甘露不死諸門延我入法墻處無爲室心王住中道城以法誠惠爲法墻塹旡上三法太極真人徐來勒之諸天大聖㑹蓬萊稽首道前太上道君坐寳花之上左右仙童玉女數萬道君佩九色離羅之披飛森霜球之袍須吏萬變之冠帶晨冠日鈴之劒玄唱四振鵬翮一撫曜龍文於滄淵煥朱虬於川澤翟天貌於蘭玉彂金精於幽谷乗大順以御至象遊清神以混五濁虚發九落洞宴九覺舞景扇虚乗空把煙精修十行以諸燈炬照於邪闇遊趣王城興大法雲雨一乗甘露法牙生道一味雨十二二法印定我法門不死之宫南極宋陵之宫作人之大法爲世之良醫靈寳初門德行之階梯得其門則道室可究行梯立則功業日髙往古來今真一自然之道極㣲極妙極玄極奥非有非無非凡非聖智慧爲舟航擺除十纒登常存之岸雨天妙花騫林之花鼓天妓樂天鈞之樂太極太虚真人告左仙公曰昔受太上金日所說真一昇玄内教𥘉門第一五帝所習此經是三業諸仙真人之父母玉清隱書師資品第二非師不行非師不生非師不度非師不仙八景龍輿焉可得挺太極玉關焉可得登髙則無上深則無窮大聖人大賢人先事小師求小道事中師求中道事大師求大道履止道爲繩爲墨爲法爲則神師真師道師仙師聖師賢師師迹有九一大慈二大悲三大喜四大捨五大善六大法七大功八大化九大德一天之中號聖真仙二十七等三一鏡其内師友坦其外三元真一崑崙玄圃宫見正一真人三天法師上清真人總仙大目馬長生法師生三君姓柏成字芝蒿乃中皇時人𡻕在東絰之際誕子北海中山柏林之下有甘露紫芝勅勃明珠三㑹交龍之華生於寢處母感白露而懷孕年十四西歸公于臣靈怕伊俱師事黄谷先生後遇玉清文始東玉金暉仙公號曰玉皇二道君授大洞真経萬鬼避三洞法師凡受三洞法籙之人二切鬼神悉皆廻避讀大洞真經三十九章者上神之事也能提携太上攝命九真高仙同品司命齊倫依太上黄素曰千四方便得稱爲大洞法師光生萬真位淮太極上仙也讀太丹隱書金華洞房及雌一寶草者精感太素師降九具五帝依太上黄素曰十四事方便得稱三元法師元景真人隹帝一髙仙讀洞真玄經者通玄逹靈開散七經依大上黄素四十四方便得稱洞玄法師上景真人位准九官土仙名入南宫真人之位大上丹簡墨録无上元君太玄童子妙行真人元極先生明威三元之官化應爲九九官九神三九二十有七階九聖九真九仙太上玉帝九錬上真三階髙者爲聖下者爲仙中爲真十化易身聖有九品上聖髙聖大聖神聖玄聖真聖仙聖靈聖至聖虵得靈寳化爲神龍禽鳥得之變爲鳯皇凡獸得之攺爲騏驎凡夫得之號曰聖人真有九品同九聖上品曰聖習學太玄升千上清中品曰真習學太平升千上清胞道胎靈玉清宫之下真乃上清宫之上真太極宫之上真乃上清宫之下真上清宫之下真乃太清官之上真太極宫之下真次得九官之飛仙太上之道有三玉清隱書神虎大符金虎真符行其道得爲太上之眞給玉童玉女各三千人位爲上真玉皇之君上真之道有六太上鬱儀奔日文太上結璘奔月章太㣲帝君飛天經大洞真經三十九章金闕靈書紫文一経黄老八道九真中經總而行之則爲上清真人給玉童玉女各三千人位爲諸天帝萬真前導鳳歌後從玄釣白帝啓路飛龍翼轅中真之道有七太丹隱書朝真上經玉帝神符三天正法鳯真之文四真之章太上金策方法洞房玉字上經六甲靈飛寳祕符三皇内文天文大字青腰紫書曲素訣辭總而行之則爲上清中道眞人給圡帝玉女各三千人位爲上清左右卿相之師行則紫旄之節從萬神千真前吹鳳唱後奏天釣玄龍啓道五帝叅軒飛行太虚下真之道有八上清九化十變三九素語丹景道精隱地八術天關三圖玄黄玉書神州七變七轉洞經絳緑黄道玉白龍書衆文素奏中章五行祕符五章玉玄上元玉書總而行之則爲上清下元真人行則五色之節玉女前嘯九鳯後吹八鸞白虬啓道太極叅軒飛行倒景遊遨紫房灌丑雲之華從頂上灌五色之氣上虚紫暎九霄真王形長九千萬丈以冬三月鎮建金華飛天冠衣日月流精文袍佩流金鳯璽帶百變交金之劒立九色蓮花紫雲之中光明洞照玉清之上春三月則變形頭戴九清口銜金鈴手執日象立紫雲上洞上青夏三月變形爲九人並衣青羽之衣頭戴一月執九色麾憧在紫雲之上秋三變形鳥青白玄三色之光明光明洞照上清元始變化龜山元録經左玄右玄真人定志四老真人在日中无影也太上真人降于河上東方青帝少陽九靈真人南方赤帝太陽南極真人西方白帝少隂靈素真人北方黒帝太隂玄靈真人中央黄帝三靈真人二十四真人受事於方諸青童後聖九玄道君列紀逍遥三清之中太上上清玉靈紫暎經仙有九品同九真下品曰仙學習太清金丹玉英升乎太清明威魂成魄就賔千紫庭上仙白日升天中品仙栖名山洞室真一自然金闕蘭臺有瓊文玉字應上仙也變化南宫遺骨胎變金仙色如金光東嶽南嶽三千九百里海東有仙人九萬王女二十四萬仙人居差陽宫去刀文山三千里中有神龍三百萬頭仙人上天乗之真人修太一之道者皆得三天之舉沐浴東井三綱六紀金紫彫黄變化無端欠有神丹金液九轉還丹訣在金書壬經玉清曜玄都十聖廻紫㣲披雲出十天飛天乗空飛丹霄翼輕蓋日月灌靈睴出二十四生圖手挽日月五通仙无上眞人吐納錬五神明真科蒨粲七寳林晃朗目月精太上治紫臺衆真誦洞經駕龍駕龍躡玄波濯足八天河故能釋天羅地綱亦巳過保子飛玄路五靈度符籍巨槽髙舶譬大乗中舫比中乗小舟喻小乗紫綈錦者用紫多比三乗十燈千燈光暎十方照曜諸天三華者太之金房之名上士一烕一生志不避退轉身登太極位加仙鄉法輪中士口味靈篇三滅三生志意審固上遊太清九官真人下士愛山